# LumiGate NAS Deployment
# Target: 绿联 DXP4800 Plus (Intel N100, x86, 16GB RAM, UGOS Pro)
# All core LumiGate services + MCP gateway + tools

name: lumigate

services:
  # ──────────────────────────────────────────────
  # Core: Nginx reverse proxy
  # ──────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: lumigate-nginx
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-9471}:80"
    volumes:
      - ../../nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - lumigate-data:/app/data:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - lumigate
      - file-parser
    networks:
      - lumigate-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 5s
      timeout: 2s
      retries: 2
      start_period: 3s

  # ──────────────────────────────────────────────
  # Core: LumiGate app + Collector Chrome
  # ──────────────────────────────────────────────
  lumigate:
    build: ../../
    container_name: lumigate
    restart: unless-stopped
    expose:
      - "9471"
    ports:
      - "127.0.0.1:${COLLECTOR_VNC_PORT:-7900}:7900"
    env_file:
      - .env
    environment:
      - CDP_HOST=127.0.0.1
      - CDP_PORT=9223
      - RESOLUTION=1280x800x24
      - OLLAMA_URL=${OLLAMA_URL:-http://192.168.1.x:11434}
      - MCP_GATEWAY_URL=http://mcpjungle:18790
      - WHISPER_URL=http://whisper:8080
    volumes:
      - lumigate-data:/app/data
      - collector-chrome-profile:/home/chrome/.chrome-profile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - searxng
    networks:
      - lumigate-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:9471/health"]
      interval: 5s
      timeout: 3s
      retries: 2
      start_period: 15s
    stop_grace_period: 15s
    shm_size: '512m'

  # ──────────────────────────────────────────────
  # Core: SearXNG web search
  # ──────────────────────────────────────────────
  searxng:
    image: searxng/searxng:latest
    container_name: lumigate-searxng
    expose:
      - "8080"
    ports:
      - "127.0.0.1:18780:8080"
    volumes:
      - ../../searxng:/etc/searxng:ro
    environment:
      - SEARXNG_BASE_URL=http://lumigate-searxng:8080
    restart: unless-stopped
    networks:
      - lumigate-net

  # ──────────────────────────────────────────────
  # Core: Cloudflare Tunnel
  # ──────────────────────────────────────────────
  cloudflare-lumigate:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare-lumigate
    command: >-
      tunnel --no-autoupdate --protocol quic --grace-period 30s
      run --token ${CF_TUNNEL_TOKEN_LUMIGATE}
    env_file:
      - .env
    depends_on:
      nginx:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - lumigate-net

  # ──────────────────────────────────────────────
  # Core: File parser (PDF/Excel/Word/CSV)
  # ──────────────────────────────────────────────
  file-parser:
    image: node:22-alpine
    container_name: lumigate-file-parser
    volumes:
      - ../../file-parser:/app
    working_dir: /app
    command: sh -c "npm install --production && node server.js"
    expose:
      - "3100"
    ports:
      - "127.0.0.1:18782:3100"
    restart: unless-stopped
    networks:
      - lumigate-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3100/health"]
      interval: 10s
      timeout: 3s
      retries: 2
      start_period: 15s

  # ──────────────────────────────────────────────
  # Core: Doc generator
  # ──────────────────────────────────────────────
  doc-gen:
    image: node:22-alpine
    container_name: lumigate-doc-gen
    volumes:
      - ../../doc-gen:/app
    working_dir: /app
    command: sh -c "npm install --production && node server.js"
    expose:
      - "3101"
    ports:
      - "127.0.0.1:18783:3101"
    restart: unless-stopped
    networks:
      - lumigate-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3101/health"]
      interval: 10s
      timeout: 3s
      retries: 2
      start_period: 15s

  # ──────────────────────────────────────────────
  # Core: Gotenberg (document conversion)
  # ──────────────────────────────────────────────
  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: lumigate-gotenberg
    command:
      - "gotenberg"
      - "--api-port=3000"
      - "--api-timeout=120s"
    ports:
      - "127.0.0.1:18785:3000"
    restart: unless-stopped
    networks:
      - lumigate-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ──────────────────────────────────────────────
  # Core: Cache cleaner
  # ──────────────────────────────────────────────
  cache-cleaner:
    image: alpine
    container_name: lumigate-cache-cleaner
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN
    command: sh -c "while true; do sleep 21600; sync; echo 3 > /proc/sys/vm/drop_caches 2>/dev/null; done"
    networks:
      - lumigate-net

  # ──────────────────────────────────────────────
  # New: MCPJungle (unified MCP gateway)
  # ──────────────────────────────────────────────
  mcpjungle:
    image: mcpjungle/mcpjungle:latest
    container_name: lumigate-mcpjungle
    ports:
      - "127.0.0.1:18790:18790"
    volumes:
      - mcpjungle-config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - PORT=18790
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - lumigate-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:18790/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ──────────────────────────────────────────────
  # New: Playwright MCP (browser automation)
  # ──────────────────────────────────────────────
  playwright:
    image: mcr.microsoft.com/playwright:v1.50.0-noble
    container_name: lumigate-playwright
    command: npx @playwright/mcp@latest --port 3200
    expose:
      - "3200"
    ports:
      - "127.0.0.1:18791:3200"
    restart: unless-stopped
    networks:
      - lumigate-net
    shm_size: '256m'

  # ──────────────────────────────────────────────
  # New: Code sandbox (isolated execution)
  # ──────────────────────────────────────────────
  code-sandbox:
    image: node:22-alpine
    container_name: lumigate-code-sandbox
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - sandbox-tmp:/tmp/sandbox
    environment:
      - SANDBOX_TIMEOUT=30
      - SANDBOX_MEM_LIMIT=256m
    expose:
      - "3300"
    ports:
      - "127.0.0.1:18792:3300"
    restart: unless-stopped
    networks:
      - lumigate-net
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=128m

  # ──────────────────────────────────────────────
  # New: whisper.cpp (ASR, temporary until Jetson)
  # ──────────────────────────────────────────────
  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest-cpu
    container_name: lumigate-whisper
    ports:
      - "127.0.0.1:17863:8080"
    environment:
      - ASR_MODEL=base
      - ASR_ENGINE=faster_whisper
    volumes:
      - whisper-models:/root/.cache
    restart: unless-stopped
    networks:
      - lumigate-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  lumigate-net:
    driver: bridge
    name: lumigate-net

volumes:
  lumigate-data:
  collector-chrome-profile:
  mcpjungle-config:
  sandbox-tmp:
  whisper-models:
