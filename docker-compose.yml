services:
  # Nginx reverse proxy — always running, serves maintenance page during app restarts
  nginx:
    image: nginx:alpine
    container_name: ai-gateway-nginx
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-9471}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - ai-api-proxy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 3s

  # App server — can be rebuilt/restarted without downtime
  ai-api-proxy:
    build: .
    container_name: ai-api-proxy
    restart: unless-stopped
    # No ports exposed — only accessible via nginx
    expose:
      - "9471"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9471/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    stop_grace_period: 15s

  cloudflare-aigateway:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare-aigateway
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN_AIGATEWAY}
    env_file:
      - .env
    depends_on:
      nginx:
        condition: service_healthy
    restart: unless-stopped
