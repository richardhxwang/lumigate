services:
  # Nginx reverse proxy — always running, serves maintenance page during app restarts
  nginx:
    image: nginx:alpine
    container_name: lumigate-nginx
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-9471}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./data:/app/data:ro
    depends_on:
      - lumigate
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 5s
      timeout: 2s
      retries: 2
      start_period: 3s

  # App server — can be rebuilt/restarted without downtime
  lumigate:
    build: .
    container_name: lumigate
    restart: unless-stopped
    # No ports exposed — only accessible via nginx
    expose:
      - "9471"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:9471/health',r=>{r.statusCode===200?process.exit(0):process.exit(1)}).on('error',()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 2
      start_period: 8s
    stop_grace_period: 15s

  cloudflare-lumigate:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare-lumigate
    command: >-
      tunnel --no-autoupdate --protocol quic --grace-period 30s
      run --token ${CF_TUNNEL_TOKEN_LUMIGATE}
    env_file:
      - .env
    depends_on:
      nginx:
        condition: service_healthy
    restart: unless-stopped

  cache-cleaner:
    image: alpine
    container_name: lumigate-cache-cleaner
    restart: unless-stopped
    privileged: true
    command: sh -c "while true; do sleep 21600; sync; echo 3 > /proc/sys/vm/drop_caches; done"
