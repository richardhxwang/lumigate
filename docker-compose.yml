services:
  ai-api-proxy:
    build: .
    container_name: ai-api-proxy
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>r.json()).then(d=>{if(d.status!=='ok')process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    stop_grace_period: 15s

  cloudflare-aigateway:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare-aigateway
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN_AIGATEWAY}
    env_file:
      - .env
    depends_on:
      ai-api-proxy:
        condition: service_healthy
    restart: unless-stopped
