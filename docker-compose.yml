name: lumigate

x-logging-default: &logging-default
  driver: local
  options:
    max-size: "20m"
    max-file: "10"

services:
  pocketbase:
    image: pocketbase/pocketbase:latest
    container_name: lumigate-pocketbase
    restart: unless-stopped
    command: ["serve", "--http=0.0.0.0:8090", "--dir=/pb_data"]
    ports:
      - "127.0.0.1:8090:8090"
    volumes:
      - ./data/pocketbase:/pb_data
    logging: *logging-default

  nginx:
    image: nginx:alpine
    container_name: lumigate-nginx
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-9471}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./data:/app/data:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - lumigate
      - file-parser
    logging: *logging-default
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 5s
      timeout: 2s
      retries: 2
      start_period: 3s

  searxng:
    image: searxng/searxng:latest
    container_name: lumigate-searxng
    expose:
      - "8080"
    ports:
      - "127.0.0.1:18780:8080"
    volumes:
      - ./searxng:/etc/searxng:ro
    environment:
      - SEARXNG_BASE_URL=http://lumigate-searxng:8080
    restart: unless-stopped
    logging: *logging-default

  # LumiGate + Collector Chrome (combined)
  # Chromium runs inside the same container on 127.0.0.1:9223
  # noVNC on :7900 for visual login when needed
  lumigate:
    build: .
    container_name: lumigate
    restart: unless-stopped
    expose:
      - "9471"
    ports:
      - "127.0.0.1:${COLLECTOR_VNC_PORT:-7900}:7900"  # localhost only, not exposed to internet
    env_file:
      - .env
    environment:
      - CDP_HOST=127.0.0.1
      - CDP_PORT=9223
      - RESOLUTION=1280x800x24
      - NODE_MAX_OLD_SPACE_MB=${NODE_MAX_OLD_SPACE_MB:-768}
      - LUMIGENT_SANDBOX_IMAGE=${LUMIGENT_SANDBOX_IMAGE:-lumigate/sandbox-runtime:latest}
      - LUMIGENT_SANDBOX_CMD_ALLOWLIST=${LUMIGENT_SANDBOX_CMD_ALLOWLIST:-ALL}
      - WHISPER_URL=http://whisper:9000
      - WHISPER_ENDPOINT=/asr
      - VOLCENGINE_TTS_APP_ID=${VOLCENGINE_TTS_APP_ID:-wxk-tts}
      - VOLCENGINE_TTS_TOKEN=${VOLCENGINE_TTS_TOKEN:-OrKH2_RUyb-u3OfUPiWGvMqdwS-PYxyW}
      - VOLCENGINE_TTS_CLUSTER=${VOLCENGINE_TTS_CLUSTER:-volcano_tts}
      - PB_URL=${PB_URL:-http://pocketbase:8090}
      - DOCKER_HOST=unix:///var/run/docker.sock
      - QDRANT_URL=http://lumigate-qdrant:6333
      - TRADE_ENGINE_URL=http://lumigate-trade-engine:3200
      - TRADE_FREQTRADE_URL=http://lumigate-freqtrade:8080
      - TRADE_FREQTRADE_USERNAME=${FREQTRADE_USERNAME:-lumitrade}
      - TRADE_FREQTRADE_PASSWORD=${FREQTRADE_PASSWORD:-123123@}
    volumes:
      - ./data:/app/data
      - collector-chrome-profile:/home/chrome/.chrome-profile
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - searxng
      - whisper
      - pocketbase
      - qdrant
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:9471/health"]
      interval: 5s
      timeout: 3s
      retries: 2
      start_period: 15s
    stop_grace_period: 15s
    shm_size: '512m'
    logging: *logging-default

  cloudflare-lumigate:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare-lumigate
    command: >-
      tunnel --no-autoupdate --protocol quic --grace-period 30s
      run --token ${CF_TUNNEL_TOKEN_LUMIGATE}
    env_file:
      - .env
    depends_on:
      nginx:
        condition: service_healthy
    restart: unless-stopped
    logging: *logging-default

  file-parser:
    image: node:22-alpine
    container_name: lumigate-file-parser
    volumes:
      - ./file-parser:/app
    environment:
      - FILE_PARSER_MAX_FILE_SIZE=104857600
    working_dir: /app
    command: sh -c "apk add --no-cache poppler-utils poppler-data >/dev/null && npm install --omit=dev && node server.js"
    expose:
      - "3100"
    ports:
      - "127.0.0.1:18782:3100"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3100/health"]
      interval: 10s
      timeout: 3s
      retries: 2
      start_period: 15s
    logging: *logging-default

  doc-gen:
    image: node:22-alpine
    container_name: lumigate-doc-gen
    volumes:
      - ./doc-gen:/app
    working_dir: /app
    command: sh -c "npm install --production && node server.js"
    expose:
      - "3101"
    ports:
      - "127.0.0.1:18783:3101"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3101/health"]
      interval: 10s
      timeout: 3s
      retries: 2
      start_period: 15s
    logging: *logging-default

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: lumigate-gotenberg
    command:
      - "gotenberg"
      - "--api-port=3000"
      - "--api-timeout=120s"
    ports:
      - "127.0.0.1:18785:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *logging-default

  # Whisper.cpp — speech-to-text (port 17863)
  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: lumigate-whisper
    ports:
      - "127.0.0.1:17863:9000"
    environment:
      - ASR_MODEL=base
      - ASR_ENGINE=openai_whisper
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:9000/docs"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging: *logging-default

  qdrant:
    image: qdrant/qdrant:latest
    container_name: lumigate-qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:6333/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    logging: *logging-default

  ragflow:
    image: infiniflow/ragflow:latest
    container_name: lumigate-ragflow
    restart: unless-stopped
    profiles: ["rag"]
    ports:
      - "127.0.0.1:9380:9380"
    volumes:
      - ragflow_data:/ragflow/data
    environment:
      - RAGFLOW_API_KEY=${RAGFLOW_API_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:9380/api/v1/datasets?page_size=1", "-H", "Authorization: Bearer ${RAGFLOW_API_KEY:-test}"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    logging: *logging-default

  docling-parser:
    build: services/docling-parser
    container_name: lumigate-docling
    restart: unless-stopped
    # No profile — always on (required for Casting / financial analysis)
    ports:
      - "127.0.0.1:18786:3102"
    expose:
      - "3102"
    environment:
      - PORT=3102
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:3102/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    logging: *logging-default

  loki:
    image: grafana/loki:latest
    container_name: lumigate-loki
    profiles: ["observability"]
    command:
      - -config.file=/etc/loki/config.yml
    ports:
      - "127.0.0.1:19410:3100"
    volumes:
      - ./docker/monitoring/loki-config.yml:/etc/loki/config.yml:ro
      - ./docker/monitoring/loki-rules:/etc/loki/rules:ro
      - ./data/monitoring/loki:/loki
    depends_on:
      - alertmanager
    restart: unless-stopped
    logging: *logging-default

  promtail:
    image: grafana/promtail:latest
    container_name: lumigate-promtail
    profiles: ["observability"]
    command:
      - -config.file=/etc/promtail/config.yml
    volumes:
      - ./docker/monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - ./data/monitoring/promtail:/tmp
      - ./data:/host_data:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    restart: unless-stopped
    logging: *logging-default

  alertmanager:
    image: prom/alertmanager:v0.28.0
    container_name: lumigate-alertmanager
    profiles: ["observability"]
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    ports:
      - "127.0.0.1:19093:9093"
    volumes:
      - ./docker/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./data/monitoring/alertmanager:/alertmanager
    restart: unless-stopped
    logging: *logging-default

  # ── LumiTrade containers (--profile trade) ──────────────────────────────────
  trade-engine:
    build: ./lumitrade/trade-engine
    container_name: lumigate-trade-engine
    profiles: ["trade"]
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "3200"
    ports:
      - "127.0.0.1:18793:3200"
    environment:
      - TRADE_PB_URL=http://host.docker.internal:8090
      - TRADE_PB_ADMIN_EMAIL=${PB_ADMIN_EMAIL:-richard.hx.wang@gmail.com}
      - TRADE_PB_ADMIN_PASSWORD=${PB_ADMIN_PASSWORD:-}
      - TRADE_LUMIGATE_URL=http://lumigate:9471
      - TRADE_FREQTRADE_URL=http://lumigate-freqtrade:8080
      - TRADE_FINNHUB_API_KEY=${FINNHUB_API_KEY:-}
      - TRADE_TELEGRAM_BOT_TOKEN=${TRADE_TELEGRAM_BOT_TOKEN:-}
      - TRADE_TELEGRAM_CHAT_ID=${TRADE_TELEGRAM_CHAT_ID:-}
      - TRADE_FREQTRADE_PASSWORD=123123@
      - TRADE_IBKR_HOST=lumigate-ibgateway
      - TRADE_IBKR_PORT=4002
    depends_on:
      - pocketbase
      - qdrant
      - freqtrade
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:3200/health"]
      interval: 10s
      timeout: 3s
      retries: 2
      start_period: 20s
    logging: *logging-default

  freqtrade:
    build: ./lumitrade/freqtrade
    container_name: lumigate-freqtrade
    profiles: ["trade"]
    restart: unless-stopped
    volumes:
      - ./lumitrade/freqtrade/user_data:/freqtrade/user_data
      - ./lumitrade/freqtrade/config.json:/freqtrade/config.json:ro
      - ./lumitrade/frequi-custom/installed:/freqtrade/freqtrade/rpc/api_server/ui/installed:ro
    ports:
      - "127.0.0.1:18790:8080"
    environment:
      - FREQTRADE__EXCHANGE__KEY=${OKX_API_KEY:-}
      - FREQTRADE__EXCHANGE__SECRET=${OKX_API_SECRET:-}
      - FREQTRADE__EXCHANGE__PASSWORD=${OKX_API_PASSPHRASE:-}
      - FREQTRADE__TELEGRAM__TOKEN=${FREQTRADE_TELEGRAM_TOKEN:-}
      - FREQTRADE__TELEGRAM__CHAT_ID=${FREQTRADE_TELEGRAM_CHAT_ID:-}
    command: >
      trade
      --logfile /freqtrade/user_data/logs/freqtrade.log
      --db-url sqlite:////freqtrade/user_data/tradesv3.sqlite
      --config /freqtrade/config.json
      --strategy SMCStrategy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/api/v1/ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s
    logging: *logging-default

  # Freqtrade webserver mode — for backtesting UI (separate from trade instance)
  freqtrade-backtest:
    build: ./lumitrade/freqtrade
    container_name: lumigate-freqtrade-bt
    profiles: ["trade"]
    restart: unless-stopped
    volumes:
      - ./lumitrade/freqtrade/user_data:/freqtrade/user_data
      - ./lumitrade/freqtrade/config.json:/freqtrade/config.json:ro
      - ./lumitrade/frequi-custom/installed:/freqtrade/freqtrade/rpc/api_server/ui/installed:ro
    ports:
      - "127.0.0.1:18795:8080"
    command: >
      webserver
      --config /freqtrade/config.json
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/api/v1/ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s
    logging: *logging-default

  finbert:
    build:
      context: ./lumitrade/finbert
      dockerfile: Dockerfile
    container_name: lumigate-finbert
    profiles: ["trade"]
    restart: unless-stopped
    expose:
      - "5000"
    ports:
      - "127.0.0.1:18792:5000"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    logging: *logging-default

  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:stable
    container_name: lumigate-ibgateway
    profiles: ["trade"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:4001:4001"
      - "127.0.0.1:4002:4002"
      - "127.0.0.1:5900:5900"
    environment:
      - TWS_USERID=${IBKR_USERNAME:-}
      - TWS_PASSWORD=${IBKR_PASSWORD:-}
      - TRADING_MODE=${IBKR_TRADING_MODE:-paper}
      - TWS_ACCEPT_INCOMING=accept
      - READ_ONLY_API=${IBKR_READ_ONLY:-yes}
      - VNC_SERVER_PASSWORD=${IBKR_VNC_PASSWORD:-lumitrade}
    ulimits:
      nofile:
        soft: 10000
        hard: 10000
    logging: *logging-default

volumes:
  collector-chrome-profile:
  qdrant_data:
  ragflow_data:
