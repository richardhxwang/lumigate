name: lumitrade

services:
  trade-engine:
    build: ./trade-engine
    container_name: lumigate-trade-engine
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "3200"
    ports:
      - "127.0.0.1:18793:3200"
    environment:
      - TRADE_PB_URL=http://host.docker.internal:8090
      - TRADE_PB_ADMIN_EMAIL=${PB_ADMIN_EMAIL:-richard.hx.wang@gmail.com}
      - TRADE_PB_ADMIN_PASSWORD=${PB_ADMIN_PASSWORD:-}
      - TRADE_LUMIGATE_URL=http://lumigate:9471
      - TRADE_FREQTRADE_URL=http://lumigate-freqtrade:8080
      - TRADE_FINNHUB_API_KEY=${FINNHUB_API_KEY:-}
      - TRADE_LUNARCRUSH_API_KEY=${LUNARCRUSH_API_KEY:-}
      - TRADE_TELEGRAM_BOT_TOKEN=${TRADE_TELEGRAM_BOT_TOKEN:-}
      - TRADE_TELEGRAM_CHAT_ID=${TRADE_TELEGRAM_CHAT_ID:-}
      - TRADE_FREQTRADE_PASSWORD=${FREQTRADE_API_PASSWORD:-changeme}
      - TRADE_IBKR_HOST=lumigate-ibgateway
      - TRADE_IBKR_PORT=4002
    networks:
      - default
      - lumigate
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:3200/health"]
      interval: 10s
      timeout: 3s
      retries: 2
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  freqtrade:
    build: ./freqtrade
    container_name: lumigate-freqtrade
    restart: always
    volumes:
      - ./freqtrade/user_data:/freqtrade/user_data
      - ./freqtrade/config.json:/freqtrade/config.json:ro
      - ./frequi-custom/installed:/freqtrade/freqtrade/rpc/api_server/ui/installed:ro
    ports:
      - "127.0.0.1:18790:8080"
    environment:
      - FREQTRADE__EXCHANGE__KEY=${OKX_API_KEY:-}
      - FREQTRADE__EXCHANGE__SECRET=${OKX_API_SECRET:-}
      - FREQTRADE__EXCHANGE__PASSWORD=${OKX_API_PASSPHRASE:-}
      - FREQTRADE__TELEGRAM__TOKEN=${FREQTRADE_TELEGRAM_TOKEN:-}
      - FREQTRADE__TELEGRAM__CHAT_ID=${FREQTRADE_TELEGRAM_CHAT_ID:-}
      - FREQTRADE__API_SERVER__PASSWORD=${FREQTRADE_API_PASSWORD:-changeme}
      - FREQTRADE__API_SERVER__JWT_SECRET_KEY=${FREQTRADE_JWT_SECRET:-changeme-generate-a-random-key}
      - FREQTRADE__API_SERVER__WS_TOKEN=${FREQTRADE_WS_TOKEN:-changeme-generate-a-random-token}
    command: >
      trade
      --logfile /freqtrade/user_data/logs/freqtrade.log
      --db-url sqlite:////freqtrade/user_data/tradesv3.sqlite
      --config /freqtrade/config.json
      --strategy SMCStrategy
      --freqaimodel LightGBMRegressor
    networks:
      - default
      - lumigate
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/api/v1/ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Pure SMC bot — no LumiLearning, for A/B comparison
  freqtrade-pure:
    build: ./freqtrade
    container_name: lumigate-freqtrade-pure
    restart: always
    volumes:
      - ./freqtrade/user_data:/freqtrade/user_data
      - ./freqtrade/config-pure-smc.json:/freqtrade/config.json:ro
      - ./frequi-custom/installed:/freqtrade/freqtrade/rpc/api_server/ui/installed:ro
    ports:
      - "127.0.0.1:18791:8080"
    environment:
      - FREQTRADE__EXCHANGE__KEY=${OKX_API_KEY:-}
      - FREQTRADE__EXCHANGE__SECRET=${OKX_API_SECRET:-}
      - FREQTRADE__EXCHANGE__PASSWORD=${OKX_API_PASSPHRASE:-}
      - FREQTRADE__API_SERVER__PASSWORD=${FREQTRADE_API_PASSWORD:-changeme}
      - FREQTRADE__API_SERVER__JWT_SECRET_KEY=${FREQTRADE_JWT_SECRET:-changeme-generate-a-random-key}
      - FREQTRADE__API_SERVER__WS_TOKEN=${FREQTRADE_WS_TOKEN:-changeme-generate-a-random-token}
    command: >
      trade
      --logfile /freqtrade/user_data/logs/freqtrade-pure.log
      --db-url sqlite:////freqtrade/user_data/tradesv3-pure.sqlite
      --config /freqtrade/config.json
      --strategy SMCStrategy
    networks:
      - default
      - lumigate
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/api/v1/ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # AI-Enhanced bot — FreqAI + news sentiment, futures with shorting
  freqtrade-ai:
    build: ./freqtrade
    container_name: lumigate-freqtrade-ai
    restart: always
    volumes:
      - ./freqtrade/user_data:/freqtrade/user_data
      - ./freqtrade/config-ai-enhanced.json:/freqtrade/config.json:ro
      - ./frequi-custom/installed:/freqtrade/freqtrade/rpc/api_server/ui/installed:ro
    ports:
      - "127.0.0.1:18792:8080"
    environment:
      - FREQTRADE__EXCHANGE__KEY=${OKX_API_KEY:-}
      - FREQTRADE__EXCHANGE__SECRET=${OKX_API_SECRET:-}
      - FREQTRADE__EXCHANGE__PASSWORD=${OKX_API_PASSPHRASE:-}
      - FREQTRADE__API_SERVER__PASSWORD=${FREQTRADE_API_PASSWORD:-changeme}
      - FREQTRADE__API_SERVER__JWT_SECRET_KEY=${FREQTRADE_JWT_SECRET:-changeme-generate-a-random-key}
      - FREQTRADE__API_SERVER__WS_TOKEN=${FREQTRADE_WS_TOKEN:-changeme-generate-a-random-token}
    command: >
      trade
      --logfile /freqtrade/user_data/logs/freqtrade-ai.log
      --db-url sqlite:////freqtrade/user_data/tradesv3-ai.sqlite
      --config /freqtrade/config.json
      --strategy SMCStrategy
      --freqaimodel LightGBMRegressor
    networks:
      - default
      - lumigate
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/api/v1/ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # === B Group: Leveraged bots (dry_run with leverage) ===

  # LumiLearning-Lev — FreqAI + leverage
  freqtrade-lev:
    build: ./freqtrade
    container_name: lumigate-freqtrade-lev
    restart: always
    volumes:
      - ./freqtrade/user_data:/freqtrade/user_data
      - ./freqtrade/config-lev.json:/freqtrade/config.json:ro
      - ./frequi-custom/installed:/freqtrade/freqtrade/rpc/api_server/ui/installed:ro
    ports:
      - "127.0.0.1:18800:8080"
    environment:
      - FREQTRADE__EXCHANGE__KEY=${OKX_API_KEY:-}
      - FREQTRADE__EXCHANGE__SECRET=${OKX_API_SECRET:-}
      - FREQTRADE__EXCHANGE__PASSWORD=${OKX_API_PASSPHRASE:-}
      - FREQTRADE__API_SERVER__PASSWORD=${FREQTRADE_API_PASSWORD:-changeme}
      - FREQTRADE__API_SERVER__JWT_SECRET_KEY=${FREQTRADE_JWT_SECRET:-changeme-generate-a-random-key}
      - FREQTRADE__API_SERVER__WS_TOKEN=${FREQTRADE_WS_TOKEN:-changeme-generate-a-random-token}
    command: >
      trade
      --logfile /freqtrade/user_data/logs/freqtrade-lev.log
      --db-url sqlite:////freqtrade/user_data/tradesv3-lev.sqlite
      --config /freqtrade/config.json
      --strategy SMCStrategy
      --freqaimodel LightGBMRegressor
    networks:
      - default
      - lumigate
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/api/v1/ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # PureSMC-Lev — no FreqAI, leverage
  freqtrade-pure-lev:
    build: ./freqtrade
    container_name: lumigate-freqtrade-pure-lev
    restart: always
    volumes:
      - ./freqtrade/user_data:/freqtrade/user_data
      - ./freqtrade/config-pure-smc-lev.json:/freqtrade/config.json:ro
      - ./frequi-custom/installed:/freqtrade/freqtrade/rpc/api_server/ui/installed:ro
    ports:
      - "127.0.0.1:18801:8080"
    environment:
      - FREQTRADE__EXCHANGE__KEY=${OKX_API_KEY:-}
      - FREQTRADE__EXCHANGE__SECRET=${OKX_API_SECRET:-}
      - FREQTRADE__EXCHANGE__PASSWORD=${OKX_API_PASSPHRASE:-}
      - FREQTRADE__API_SERVER__PASSWORD=${FREQTRADE_API_PASSWORD:-changeme}
      - FREQTRADE__API_SERVER__JWT_SECRET_KEY=${FREQTRADE_JWT_SECRET:-changeme-generate-a-random-key}
      - FREQTRADE__API_SERVER__WS_TOKEN=${FREQTRADE_WS_TOKEN:-changeme-generate-a-random-token}
    command: >
      trade
      --logfile /freqtrade/user_data/logs/freqtrade-pure-lev.log
      --db-url sqlite:////freqtrade/user_data/tradesv3-pure-lev.sqlite
      --config /freqtrade/config.json
      --strategy SMCStrategy
    networks:
      - default
      - lumigate
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/api/v1/ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # AI-Enhanced-Lev — FreqAI + news sentiment + leverage
  freqtrade-ai-lev:
    build: ./freqtrade
    container_name: lumigate-freqtrade-ai-lev
    restart: always
    volumes:
      - ./freqtrade/user_data:/freqtrade/user_data
      - ./freqtrade/config-ai-enhanced-lev.json:/freqtrade/config.json:ro
      - ./frequi-custom/installed:/freqtrade/freqtrade/rpc/api_server/ui/installed:ro
    ports:
      - "127.0.0.1:18802:8080"
    environment:
      - FREQTRADE__EXCHANGE__KEY=${OKX_API_KEY:-}
      - FREQTRADE__EXCHANGE__SECRET=${OKX_API_SECRET:-}
      - FREQTRADE__EXCHANGE__PASSWORD=${OKX_API_PASSPHRASE:-}
      - FREQTRADE__API_SERVER__PASSWORD=${FREQTRADE_API_PASSWORD:-changeme}
      - FREQTRADE__API_SERVER__JWT_SECRET_KEY=${FREQTRADE_JWT_SECRET:-changeme-generate-a-random-key}
      - FREQTRADE__API_SERVER__WS_TOKEN=${FREQTRADE_WS_TOKEN:-changeme-generate-a-random-token}
    command: >
      trade
      --logfile /freqtrade/user_data/logs/freqtrade-ai-lev.log
      --db-url sqlite:////freqtrade/user_data/tradesv3-ai-lev.sqlite
      --config /freqtrade/config.json
      --strategy SMCStrategy
      --freqaimodel LightGBMRegressor
    networks:
      - default
      - lumigate
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/api/v1/ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Freqtrade webserver mode — for backtesting UI (separate from trade instance)
  freqtrade-backtest:
    build: ./freqtrade
    container_name: lumigate-freqtrade-bt
    restart: always
    volumes:
      - ./freqtrade/user_data:/freqtrade/user_data
      - ./freqtrade/config.json:/freqtrade/config.json:ro
      - ./frequi-custom/installed:/freqtrade/freqtrade/rpc/api_server/ui/installed:ro
    ports:
      - "127.0.0.1:18795:8080"
    environment:
      - FREQTRADE__API_SERVER__PASSWORD=${FREQTRADE_API_PASSWORD:-changeme}
      - FREQTRADE__API_SERVER__JWT_SECRET_KEY=${FREQTRADE_JWT_SECRET:-changeme-generate-a-random-key}
      - FREQTRADE__API_SERVER__WS_TOKEN=${FREQTRADE_WS_TOKEN:-changeme-generate-a-random-token}
    command: >
      webserver
      --config /freqtrade/config.json
    networks:
      - default
      - lumigate
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/api/v1/ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  finbert:
    build:
      context: ./finbert
      dockerfile: Dockerfile
    container_name: lumigate-finbert
    restart: always
    expose:
      - "5000"
    ports:
      - "127.0.0.1:18796:5000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:stable
    container_name: lumigate-ibgateway
    restart: unless-stopped
    ports:
      - "127.0.0.1:4001:4001"
      - "127.0.0.1:4002:4002"
      - "127.0.0.1:5900:5900"
    volumes:
      - ./ib-gateway/jts.ini:/home/ibgateway/Jts/jts.ini
    environment:
      - TWS_USERID=${IBKR_USERNAME:-}
      - TWS_PASSWORD=${IBKR_PASSWORD:-}
      - TRADING_MODE=${IBKR_TRADING_MODE:-paper}
      - TWS_SETTINGS_PATH=
      - TWS_ACCEPT_INCOMING=accept
      - READ_ONLY_API=${IBKR_READ_ONLY:-yes}
      - VNC_SERVER_PASSWORD=${IBKR_VNC_PASSWORD:-lumitrade}
      - TIME_ZONE=Asia/Hong_Kong
    ulimits:
      nofile:
        soft: 10000
        hard: 10000
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  default:
    name: ai-api-proxy_default
    external: true
  lumigate:
    name: lumigate_default
    external: true
