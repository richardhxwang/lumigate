      --bs-link-color: #10a37f !important;

    /* Badges */
    .badge.bg-primary { background-color: #10a37f !important; }

    .badge.bg-danger { background-color: #ef4444 !important; }

    .text-danger, .profit-negative { color: #ef4444 !important; }
