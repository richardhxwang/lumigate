<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='16' fill='%2310a37f'/%3E%3Cpolyline points='6 22 12 14 18 18 26 10' stroke='white' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3Cpolyline points='21 10 26 10 26 15' stroke='white' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E">
  <title>LumiTrade</title>

  <script type="module" crossorigin src="/assets/index-D3hXVh8R.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-CJA4txlp.css">
  <style>
    /* LumiTrade — minimal skin: accent color + font + logo only. No background overrides. */
    :root {
      --p-primary-color: #10a37f !important;
      --p-primary-contrast-color: #fff !important;
      --color-profit: #22c55e !important;
      --color-loss: #ef4444 !important;
    }
    * { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif !important; }

    /* Hide original broken logo image completely */
    a[href="/"] > img, .navbar-brand > img, img[alt="Home"] {
      display: none !important; width: 0 !important; height: 0 !important; overflow: hidden !important;
    }
  </style>
</head>

<body>
  <noscript>
    <strong>Please enable JavaScript to use LumiTrade.</strong>
  </noscript>
  <div id="app"></div>
  <script>
    // Replace "Freqtrade UI" text with "LumiTrade" after Vue mounts
    new MutationObserver(function(mutations, obs) {
      // Fix navbar brand text
      var brands = document.querySelectorAll('.navbar-brand, a[href="/"]');
      brands.forEach(function(el) {
        el.childNodes.forEach(function(node) {
          if (node.nodeType === 3 && node.textContent.trim().includes('Freqtrade')) {
            node.textContent = node.textContent.replace('Freqtrade UI', 'LumiTrade').replace('FreqUI', 'LumiTrade');
          }
        });
        // Also check spans
        el.querySelectorAll('span').forEach(function(span) {
          if (span.textContent.includes('Freqtrade') || span.textContent.includes('FreqUI')) {
            span.textContent = span.textContent.replace('Freqtrade UI', 'LumiTrade').replace('FreqUI', 'LumiTrade');
          }
        });
      });
      // Fix page title
      if (document.title.includes('FreqUI')) document.title = document.title.replace('FreqUI', 'LumiTrade');
    }).observe(document.body, { childList: true, subtree: true, characterData: true });
  </script>
</body>

</html>
