<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='16' fill='%2310a37f'/%3E%3Cpolyline points='6 22 12 14 18 18 26 10' stroke='white' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3Cpolyline points='21 10 26 10 26 15' stroke='white' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E">
  <title>LumiTrade</title>
  <style>
    #lt-splash{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;transition:opacity .5s ease,visibility .5s}
    @media(prefers-color-scheme:dark){#lt-splash{background:#212121}}
    @media(prefers-color-scheme:light){#lt-splash{background:#fff}}
    #lt-splash.out{opacity:0;visibility:hidden;pointer-events:none}
    #lt-splash-ball{display:block;animation:lt-drop 1.5s ease forwards;transform-origin:center bottom;will-change:transform}
    #lt-splash-title{font-size:26px;font-weight:700;letter-spacing:-.3px;opacity:0;animation:lt-ti .5s ease forwards;animation-delay:1.1s;font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif}
    @media(prefers-color-scheme:dark){#lt-splash-title{color:#ececec}}
    @media(prefers-color-scheme:light){#lt-splash-title{color:#0d0d0d}}
    .lt-a{color:#10a37f}
    @keyframes lt-drop{0%{transform:translate3d(0,-300px,0)}36%{transform:translate3d(0,0,0) scaleY(.91) scaleX(1.09)}52%{transform:translate3d(0,-90px,0)}65%{transform:translate3d(0,0,0) scaleY(.95) scaleX(1.05)}74%{transform:translate3d(0,-34px,0)}82%{transform:translate3d(0,0,0) scaleY(.98) scaleX(1.02)}88%{transform:translate3d(0,-6px,0)}100%{transform:translate3d(0,0,0)}}
    @keyframes lt-ti{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  </style>
  <script type="module" crossorigin src="/lumitrade/assets/index-DEKkIZn1.js"></script>
  <link rel="stylesheet" crossorigin href="/lumitrade/assets/index-D1TZkWYH.css">
</head>

<body>
  <div id="lt-splash">
    <div style="display:flex;flex-direction:column;align-items:center;gap:18px">
      <svg id="lt-splash-ball" viewBox="0 0 40 40" width="64" height="64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="20" cy="20" r="20" fill="#10a37f"/>
        <polyline points="10 26 17 18 23 22 30 14" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <polyline points="25 14 30 14 30 19" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div id="lt-splash-title">Lumi<span class="lt-a">Trade</span></div>
    </div>
  </div>
  <script>
    // Splash only (no more localStorage clearing — login persists)
    if(sessionStorage.getItem('lt-sd')){document.getElementById('lt-splash').remove()}
    else{sessionStorage.setItem('lt-sd','1');setTimeout(function(){var s=document.getElementById('lt-splash');if(s){s.classList.add('out');setTimeout(function(){s.remove()},600)}},2200)}
  </script>
  <noscript><strong>LumiTrade requires JavaScript.</strong></noscript>
  <div id="app"></div>
</body>

</html>
