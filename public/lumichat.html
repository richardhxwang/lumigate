<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LumiChat</title>
  <link rel="stylesheet" href="/lumichat-libs/highlight-github-dark.min.css" nonce="{{NONCE}}">
  <script nonce="{{NONCE}}" src="/lumichat-libs/marked.min.js"></script>
  <script nonce="{{NONCE}}" src="/lumichat-libs/dompurify.min.js"></script>
  <script nonce="{{NONCE}}" src="/lumichat-libs/highlight.min.js"></script>
  <style nonce="{{NONCE}}">
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --sb: #171717; --sb-hover: #212121; --sb-active: #2a2a2a;
      --bg: #212121; --inp: #2f2f2f; --inp-b: #3f3f3f; --inp-bh: #575757;
      --t1: #ececec; --t2: #8e8e8e; --t3: #555;
      --user-bg: #2f2f2f; --accent: #10a37f;
      --border: #303030; --code-bg: #1e1e1e;
      --sw: 260px; --hh: 52px;
    }
    html,body{height:100%;background:var(--bg);color:var(--t1);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;font-size:15px;line-height:1.6;overflow:hidden}

    /* AUTH — ChatGPT/Claude style */
    #auth{position:fixed;inset:0;background:#0d0d0d;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;padding:20px}
    .auth-wrap{width:100%;max-width:400px}
    .auth-logo{text-align:center;margin-bottom:32px}
    .auth-logo svg{width:40px;height:40px;margin-bottom:16px}
    .auth-logo h1{font-size:28px;font-weight:700;color:#fff;letter-spacing:-.5px}
    .auth-logo p{font-size:14px;color:#8e8e8e;margin-top:6px}
    .google-btn{width:100%;padding:13px 16px;background:#fff;border:1px solid #e0e0e0;border-radius:12px;color:#1a1a1a;font-size:15px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:background .15s,box-shadow .15s;margin-bottom:4px}
    .google-btn:hover{background:#f5f5f5;box-shadow:0 2px 8px rgba(0,0,0,.15)}
    .auth-divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:#555;font-size:13px}
    .auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:#2a2a2a}
    /* step-based: show email first, then password */
    .auth-step{display:flex;flex-direction:column;gap:12px}
    .auth-heading{font-size:22px;font-weight:700;color:#fff;margin-bottom:4px;text-align:center}
    .auth-sub{font-size:13.5px;color:#8e8e8e;text-align:center;margin-bottom:8px}
    .auth-input{width:100%;background:#1a1a1a;border:1.5px solid #2e2e2e;border-radius:12px;padding:14px 16px;color:#fff;font-size:15px;outline:none;transition:border .15s;-webkit-text-fill-color:#fff}
    .auth-input:focus{border-color:var(--accent)}
    .auth-input::placeholder{color:#555}
    .auth-input:-webkit-autofill,.auth-input:-webkit-autofill:hover,.auth-input:-webkit-autofill:focus{-webkit-box-shadow:0 0 0 1000px #1a1a1a inset!important;-webkit-text-fill-color:#fff!important;border-color:#2e2e2e!important;caret-color:#fff}
    .auth-btn{width:100%;padding:14px;background:var(--accent);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .15s,background .15s}
    .auth-btn:hover:not(:disabled){background:#0d9268}
    .auth-btn:disabled{opacity:.4;cursor:default}
    .auth-btn-ghost{width:100%;padding:14px;background:transparent;border:1.5px solid #2e2e2e;border-radius:12px;color:#fff;font-size:15px;font-weight:500;cursor:pointer;transition:border .15s,background .15s}
    .auth-btn-ghost:hover{background:#1a1a1a;border-color:#444}
    .auth-link{text-align:center;font-size:13.5px;color:#8e8e8e;margin-top:4px}
    .auth-link a{color:#10a37f;cursor:pointer;text-decoration:none}
    .auth-link a:hover{text-decoration:underline}
    .auth-err{color:#f87171;font-size:13px;text-align:center;min-height:18px;margin-top:2px}
    /* legacy compat */
    .auth-field{margin-bottom:12px}
    .auth-field label{display:block;font-size:12.5px;color:#8e8e8e;margin-bottom:6px}
    .auth-field input{width:100%;background:#1a1a1a;border:1.5px solid #2e2e2e;border-radius:12px;padding:13px 16px;color:#fff;font-size:15px;outline:none;transition:border .15s;-webkit-text-fill-color:#fff}
    .auth-field input:focus{border-color:var(--accent)}
    .auth-field input::placeholder{color:#555}
    .auth-field input:-webkit-autofill,.auth-field input:-webkit-autofill:hover,.auth-field input:-webkit-autofill:focus{-webkit-box-shadow:0 0 0 1000px #1a1a1a inset!important;-webkit-text-fill-color:#fff!important;border-color:#2e2e2e!important;caret-color:#fff}
    .auth-submit{width:100%;padding:14px;background:var(--accent);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .15s}
    .auth-submit:hover:not(:disabled){opacity:.9}
    .auth-submit:disabled{opacity:.4;cursor:default}
    .auth-tabs{display:none}
    .auth-card{background:transparent;border:none;padding:0;width:100%}

    /* LAYOUT */
    #app{display:flex;height:100%}
    #sidebar{width:var(--sw);background:var(--sb);display:flex;flex-direction:column;flex-shrink:0;border-right:1px solid var(--border);overflow:hidden;transition:width .2s}
    #sidebar.collapsed{width:0;border-right:none}
    .sb-top{padding:10px;display:flex;gap:6px}
    .ib{width:36px;height:36px;border:none;background:transparent;color:var(--t2);cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s;flex-shrink:0}
    .ib:hover{background:var(--sb-hover);color:var(--t1)}
    .ib svg{width:18px;height:18px}
    .new-btn{flex:1;text-align:left;padding:0 10px;font-size:13.5px;gap:8px;display:flex;align-items:center}
    .sb-list{flex:1;overflow-y:auto;padding:4px 8px}
    .sb-list::-webkit-scrollbar{width:4px}
    .sb-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
    .grp-label{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;padding:12px 8px 4px}
    .sess-item{display:flex;align-items:center;padding:8px 10px;border-radius:8px;cursor:pointer;color:var(--t2);font-size:13.5px;position:relative;white-space:nowrap;overflow:hidden;gap:6px}
    .sess-item:hover{background:var(--sb-hover);color:var(--t1)}
    .sess-item.active{background:var(--sb-active);color:var(--t1)}
    .sess-title{flex:1;overflow:hidden;text-overflow:ellipsis}
    .sess-acts{display:none;gap:2px;flex-shrink:0}
    .sess-item:hover .sess-acts,.sess-item.active .sess-acts{display:flex}
    .sab{width:24px;height:24px;border:none;background:transparent;color:var(--t3);cursor:pointer;border-radius:4px;display:flex;align-items:center;justify-content:center}
    .sab:hover{color:var(--t1);background:var(--sb-active)}
    .sab svg{width:13px;height:13px}
    .sb-foot{padding:10px 14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--t3)}
    .sb-foot .user-dot{width:28px;height:28px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
    .sb-foot-info{flex:1;overflow:hidden}
    .sb-foot-name{font-size:13px;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sb-foot-email{font-size:11px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .logout-btn{background:transparent;border:none;color:var(--t3);cursor:pointer;padding:4px;border-radius:4px}
    .logout-btn:hover{color:var(--t1)}
    .logout-btn svg{width:15px;height:15px}

    /* MAIN */
    #main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
    #header{display:flex;align-items:center;gap:8px;padding:8px 16px;border-bottom:1px solid var(--border);flex-shrink:0;min-height:var(--hh);position:relative}
    #mdl-btn{display:flex;align-items:center;gap:6px;background:transparent;border:none;color:var(--t1);font-size:15px;font-weight:600;cursor:pointer;padding:6px 8px;border-radius:8px;transition:background .15s}
    #mdl-btn:hover{background:var(--sb-hover)}
    #mdl-btn svg{width:16px;height:16px;color:var(--t2)}
    #mdl-drop{position:absolute;top:calc(var(--hh) + 4px);left:0;background:#2a2a2a;border:1px solid var(--border);border-radius:12px;padding:8px;min-width:320px;max-height:70vh;overflow-y:auto;z-index:100;box-shadow:0 8px 32px rgba(0,0,0,.5);display:none}
    #mdl-drop.open{display:block}
    #mdl-drop::-webkit-scrollbar{width:4px}
    #mdl-drop::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
    .mdl-provs{display:flex;flex-wrap:wrap;gap:6px;padding:4px 4px 8px;border-bottom:1px solid var(--border);margin-bottom:6px}
    .mdl-prov-pill{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);color:var(--t2);background:transparent;transition:all .15s;white-space:nowrap}
    .mdl-prov-pill:hover{color:var(--t1);border-color:#555}
    .mdl-prov-pill.sel{background:var(--accent);border-color:var(--accent);color:#fff}
    .mdl-grp{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;padding:8px 10px 4px}
    .mdl-opt{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:background .1s}
    .mdl-opt:hover{background:var(--sb-hover)}
    .mdl-opt.sel{background:var(--sb-active)}
    .mdl-info{flex:1}
    .mdl-name{font-size:13.5px;font-weight:500}
    .mdl-desc{font-size:11.5px;color:var(--t3);margin-top:1px}
    .mdl-chk{width:16px;height:16px;color:var(--accent);flex-shrink:0}
    .cap-icon{position:relative;width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--inp);display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;transition:background .15s}
    .cap-icon:hover{background:var(--sb-active)}
    .cap-tip{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#1a1a1a;border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:12px;color:var(--t1);white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:200}
    .cap-icon:hover .cap-tip{opacity:1}

    /* CHAT AREA */
    #chat{flex:1;overflow-y:auto;padding-bottom:16px}
    #chat::-webkit-scrollbar{width:5px}
    #chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

    /* EMPTY */
    #empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:20px;text-align:center;padding:24px}
    #empty h2{font-size:22px;font-weight:600}
    .sugg-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;max-width:500px;width:100%}
    .sugg-card{background:var(--inp);border:1px solid var(--border);border-radius:12px;padding:14px 16px;cursor:pointer;text-align:left;font-size:13.5px;color:var(--t2);transition:background .15s,border-color .15s}
    .sugg-card:hover{background:var(--sb-hover);border-color:var(--inp-bh);color:var(--t1)}

    /* MESSAGES */
    .msg-row{max-width:768px;margin:0 auto;padding:20px 24px 0}
    .msg-row.user{display:flex;justify-content:flex-end}
    .user-bub{background:var(--user-bg);border-radius:18px;padding:12px 18px;max-width:80%;font-size:15px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
    .asst-content{font-size:15px;line-height:1.75;color:var(--t1)}
    .asst-content p{margin:0 0 12px}
    .asst-content p:last-child{margin-bottom:0}
    .asst-content ul,.asst-content ol{padding-left:24px;margin:0 0 12px}
    .asst-content li{margin-bottom:4px}
    .asst-content h1,.asst-content h2,.asst-content h3{margin:20px 0 10px;font-weight:600;line-height:1.3}
    .asst-content h1{font-size:20px}
    .asst-content h2{font-size:17px}
    .asst-content h3{font-size:15px}
    .asst-content pre{background:var(--code-bg);border-radius:8px;overflow:hidden;margin:12px 0;border:1px solid var(--border)}
    .code-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:#2a2a2a;border-bottom:1px solid var(--border);font-size:12px;color:var(--t3)}
    .copy-code{background:transparent;border:none;color:var(--t3);cursor:pointer;font-size:12px;padding:2px 6px;border-radius:4px;display:flex;align-items:center;gap:4px}
    .copy-code:hover{color:var(--t1)}
    .asst-content pre code{display:block;padding:14px;font-size:13px;line-height:1.5;font-family:'SF Mono','Fira Code',monospace;overflow-x:auto}
    .asst-content code:not(pre code){background:#2a2a2a;padding:2px 5px;border-radius:4px;font-size:13px;font-family:'SF Mono','Fira Code',monospace}
    .asst-content blockquote{border-left:3px solid var(--border);padding-left:16px;color:var(--t2);margin:12px 0}
    .asst-content table{border-collapse:collapse;width:100%;margin:12px 0;font-size:14px}
    .asst-content th,.asst-content td{border:1px solid var(--border);padding:8px 12px;text-align:left}
    .asst-content th{background:var(--inp);font-weight:600}
    .asst-content a{color:#6ea8fe;text-decoration:none}
    .asst-content a:hover{text-decoration:underline}
    .msg-acts{display:flex;gap:4px;margin-top:8px;opacity:0;transition:opacity .15s}
    .msg-row:hover .msg-acts{opacity:1}
    .mab{background:transparent;border:none;color:var(--t3);cursor:pointer;border-radius:6px;padding:4px 6px;font-size:12px;display:flex;align-items:center;gap:4px;transition:color .1s,background .1s}
    .mab:hover{color:var(--t1);background:var(--sb-hover)}
    .mab svg{width:14px;height:14px}
    .typing{display:flex;gap:5px;padding:4px 0}
    .tdot{width:7px;height:7px;background:var(--t2);border-radius:50%;animation:typ 1.2s infinite ease-in-out}
    .tdot:nth-child(1){animation-delay:0s}
    .tdot:nth-child(2){animation-delay:.2s}
    .tdot:nth-child(3){animation-delay:.4s}
    @keyframes typ{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}
    .trunc-bar{text-align:center;font-size:12px;color:var(--t3);padding:8px 24px 0;max-width:768px;margin:0 auto}

    /* INPUT */
    #input-wrap{padding:10px 16px 14px;flex-shrink:0}
    .inp-box{max-width:768px;margin:0 auto;background:var(--inp);border:1px solid var(--inp-b);border-radius:16px;transition:border-color .15s}
    .inp-box:focus-within{border-color:var(--inp-bh)}
    #msg-in{width:100%;background:transparent;border:none;outline:none;color:var(--t1);font-size:15px;line-height:1.5;padding:14px 16px 0;resize:none;max-height:200px;overflow-y:auto;font-family:inherit}
    #msg-in::placeholder{color:var(--t3)}
    .inp-bar{display:flex;align-items:center;padding:8px 10px 8px 12px;gap:6px}
    .inp-left{display:flex;gap:4px;flex:1}
    .tb{width:32px;height:32px;background:transparent;border:none;color:var(--t3);cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;transition:background .1s,color .1s}
    .tb:hover{background:var(--sb-hover);color:var(--t1)}
    .tb svg{width:16px;height:16px}
    #send-btn{width:32px;height:32px;background:var(--t1);border:none;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,opacity .15s;flex-shrink:0}
    #send-btn:hover:not(:disabled){background:#d0d0d0}
    #send-btn:disabled{background:var(--sb-active);cursor:default;opacity:.5}
    #send-btn svg{width:15px;height:15px;color:var(--sb)}
    #stop-btn{width:32px;height:32px;background:transparent;border:1.5px solid var(--t2);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:border-color .15s,background .15s}
    #stop-btn:hover{background:var(--sb-hover);border-color:var(--t1)}
    #stop-btn svg{width:12px;height:12px;color:var(--t1)}
    #file-chips{display:flex;flex-wrap:wrap;gap:6px;padding:0 12px 8px}
    .fchip{display:flex;align-items:center;gap:6px;background:var(--sb-active);border:1px solid var(--border);border-radius:10px;padding:4px 8px 4px 4px;font-size:12px;color:var(--t2);max-width:180px;position:relative}
    .fchip-thumb{width:36px;height:36px;border-radius:7px;object-fit:cover;flex-shrink:0}
    .fchip-icon{width:36px;height:36px;border-radius:7px;background:var(--inp);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
    .fchip-info{display:flex;flex-direction:column;overflow:hidden;flex:1}
    .fchip-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--t1);font-size:12px;font-weight:500}
    .fchip-type{font-size:10.5px;color:var(--t3);text-transform:uppercase}
    .fchip-rm{background:none;border:none;color:var(--t3);cursor:pointer;padding:0;display:flex;align-items:center;flex-shrink:0;margin-left:2px}
    .fchip-rm:hover{color:var(--t1)}
    .inp-hint{text-align:center;font-size:11.5px;color:var(--t3);margin-top:6px}

    /* TOAST */
    #toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);background:#ef4444;color:#fff;padding:10px 16px;border-radius:10px;font-size:13.5px;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:999;max-width:400px;text-align:center}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    /* RENAME */
    .sess-rename{background:var(--inp);border:1px solid var(--accent);border-radius:6px;color:var(--t1);font-size:13.5px;padding:2px 6px;width:140px;outline:none}

    @media(max-width:640px){
      #sidebar{position:absolute;z-index:50;height:100%}
      .msg-row{padding:16px 12px 0}
      .sugg-grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth">
  <div class="auth-wrap">
    <!-- Logo -->
    <div class="auth-logo">
      <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="20" cy="20" r="20" fill="#10a37f"/>
        <path d="M12 20c0-4.4 3.6-8 8-8s8 3.6 8 8-3.6 8-8 8" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="20" cy="20" r="3" fill="#fff"/>
      </svg>
      <h1>LumiChat</h1>
    </div>

    <!-- Step 1: Welcome — Google + email entry -->
    <div id="auth-step-welcome">
      <p class="auth-heading">Welcome</p>
      <p class="auth-sub" style="margin-bottom:20px">Log in or create an account</p>

      <!-- Google button -->
      <div id="google-btn-wrap" style="display:none">
        <button class="google-btn" id="google-btn">
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-3.59-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          Continue with Google
        </button>
        <div class="auth-divider"><span>or</span></div>
      </div>

      <div class="auth-step">
        <input class="auth-input" type="email" id="l-email" placeholder="Email" autocomplete="email">
        <button class="auth-btn" id="email-continue-btn">Continue</button>
      </div>
      <div class="auth-err" id="auth-err"></div>
    </div>

    <!-- Step 2: Login password -->
    <div id="auth-step-login" style="display:none">
      <p class="auth-heading">Welcome back</p>
      <p class="auth-sub" id="login-email-display" style="margin-bottom:20px"></p>
      <div class="auth-step">
        <input class="auth-input" type="password" id="l-pass" placeholder="" autocomplete="current-password">
        <button class="auth-btn" id="l-btn">Continue</button>
        <div class="auth-link"><a id="back-to-email">← Use a different email</a></div>
      </div>

<script nonce="{{NONCE}}">
'use strict';
marked.setOptions({ breaks: true, gfm: true });

const O_SERIES = new Set(['o1','o1-mini','o1-preview','o3','o3-mini','o4-mini']);

// Per-provider model capability lookup
function getModelCaps(provider, modelId){
  const id = modelId.toLowerCase();
  const p = provider.toLowerCase();
  if(p==='gemini'){
    if(id.includes('flash') || id.includes('pro') || id.includes('2.5') || id.includes('2.0'))
      return ['image','video','audio','pdf'];
    return ['image'];
  }
  if(p==='openai'){
    if(id.includes('audio')) return ['audio'];
    if(id.includes('4o') || id.includes('4.1') || id.includes('gpt-4-')) return ['image'];
    if(id.includes('o1') || id.includes('o3') || id.includes('o4')) return ['image'];
    return [];

  if(p==='anthropic'){
    return ['image','pdf'];
  }
  if(p==='deepseek' || p==='minimax' || p==='qwen' || p==='kimi' || p==='doubao'){
    return [];
  }
  return [];
}

const CAP_META = {

const SUGGESTIONS = [

];

// STATE
let currentUser = null, sessions = [], messages = [], currentSid = null;
let selectedProvider = 'deepseek', selectedModel = 'deepseek-chat';
let isStreaming = false, abortCtrl = null, pendingFiles = [];
let providersData = [], modelsData = {};
let toastTimer = null, rafId = null, streamEl = null, streamText = '';
let dropProvider = null;

// DOM
const $ = id => document.getElementById(id);
const authEl = $('auth'), appEl = $('app'), chatEl = $('chat'), emptyEl = $('empty');
const sbList = $('sb-list'), mdlLabel = $('mdl-label'), mdlDrop = $('mdl-drop');
const msgIn = $('msg-in'), sendBtn = $('send-btn'), stopBtn = $('stop-btn');
const fileIn = $('file-in'), fileChips = $('file-chips'), suggGrid = $('sugg-grid');

// ── UTILS ──────────────────────────────────────────────────────────────────
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7) }
function toast(msg, ok=false){
  const t=$('toast'); t.textContent=msg; t.style.background=ok?'#10a37f':'#ef4444';
  t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),3500);
}
function scrollBot(smooth=true){ chatEl.scrollTo({top:chatEl.scrollHeight,behavior:smooth?'smooth':'instant'}) }

// ── API ────────────────────────────────────────────────────────────────────
async function apiFetch(path, opts={}){
  const r = await fetch(path,{credentials:'same-origin',headers:{'Content-Type':'application/json',...(opts.headers||{})},...opts});
  if(r.status===401){ showAuth(); throw new Error('Not authenticated'); }
  return r;
}
async function apiJSON(path, opts={}){
  const r = await apiFetch(path, opts);
  const d = await r.json();
  if(!r.ok) throw new Error(d.error||d.message||`HTTP ${r.status}`);
  return d;
}

// ── AUTH ───────────────────────────────────────────────────────────────────
function showAuth(){
  authEl.style.display='flex'; appEl.style.display='none';
  showAuthStep('auth-step-welcome');
  $('l-email').value=''; $('l-pass').value=''; $('auth-err').textContent='';
}
function showApp(){ authEl.style.display='none'; appEl.style.display='flex'; }

async function tryRestoreSession(){
  try {
    const me = await apiJSON('/lc/auth/me');
    currentUser = me;
    onLoggedIn();
  } catch { showAuth(); }
}

function onLoggedIn(){
  const name = currentUser.name || currentUser.email || '?';
  $('u-name').textContent = name;
  $('u-email').textContent = currentUser.email||'';

    avatarEl.innerHTML = `<img src="${esc(currentUser.avatarUrl)}" style="width:28px;height:28px;border-radius:50%;object-fit:cover">`;
  } else {
    avatarEl.textContent = name.charAt(0).toUpperCase();
  }
  showApp();
  loadProviders().then(buildModelDropdown).then(()=>updateCapBar());
  loadSessions();
  renderSuggestions();
}

// ── AUTH STEP FLOW ─────────────────────────────────────────────────────────
function showAuthStep(step){
  ['auth-step-welcome','auth-step-login','auth-step-reg'].forEach(id=>{
    const el=$( id); if(el) el.style.display= id===step?'':'none';
  });
}

// Step 1 → check email → decide login or register
$('email-continue-btn').addEventListener('click', checkEmail);
$('l-email').addEventListener('keydown', e=>{ if(e.key==='Enter') checkEmail(); });

async function checkEmail(){
  const email=$('l-email').value.trim();
  if(!email){ $('auth-err').textContent='Enter your email address'; return; }
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ $('auth-err').textContent='Enter a valid email'; return; }
  $('auth-err').textContent='';
  const btn=$('email-continue-btn'); btn.disabled=true; btn.textContent='Checking…';
  try{
    // Try fetching – if user exists login step; if not, register step
    const res = await fetch('/lc/auth/check-email',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email})
    });
    const data = res.ok ? await res.json() : {exists:false};
    if(data.exists){
      $('login-email-display').textContent=email;
      showAuthStep('auth-step-login');
      $('l-pass').focus();
    } else {
      $('reg-email-display').textContent=email;
      showAuthStep('auth-step-reg');
      $('r-name').focus();
    }
  }catch{
    // If endpoint doesn't exist, fall back to showing register
    $('reg-email-display').textContent=email;
    showAuthStep('auth-step-reg');
    $('r-name').focus();
  } finally{ btn.disabled=false; btn.textContent='Continue'; }
}

// Back links
$('back-to-email').addEventListener('click',()=>{ showAuthStep('auth-step-welcome'); $('l-email').focus(); });
$('back-to-email2').addEventListener('click',()=>{ showAuthStep('auth-step-welcome'); $('l-email').focus(); });

// Step 2: Login
async function doLogin(){
  const email=$('l-email').value.trim(), pass=$('l-pass').value;
  if(!pass){ $('auth-err-login').textContent='Enter your password'; return; }
  $('auth-err-login').textContent='';
  const btn=$('l-btn'); btn.disabled=true; btn.textContent='Signing in…';
  try{
    await apiJSON('/lc/auth/login',{method:'POST',body:JSON.stringify({email,password:pass})});
    const me=await apiJSON('/lc/auth/me');
    currentUser=me; onLoggedIn();
  }catch(e){
    const msg=e.message||'';
    // PB returns "Failed to authenticate" for OAuth-only accounts (no password set)
    if(/failed to authenticate|invalid.*credentials|no password/i.test(msg) && $('google-btn-wrap').style.display!=='none'){
      $('auth-err-login').innerHTML='This account uses Google sign-in. <a href="#" id="err-google-link" style="color:#10a37f">Continue with Google</a>';
      document.getElementById('err-google-link')?.addEventListener('click',e=>{
        e.preventDefault();
        window.location.href='/lc/auth/oauth-start?provider=google&redirect='+encodeURIComponent(window.location.pathname);
      });
    } else {
      $('auth-err-login').textContent=msg||'Incorrect password';
    }
  }
  finally{ btn.disabled=false; btn.textContent='Continue'; }
}
$('l-btn').addEventListener('click',doLogin);
$('l-pass').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });

// Step 3: Register
async function doRegister(){
  const email=$('l-email').value.trim();
  const name=$('r-name').value.trim();
  const pass=$('r-pass').value, pass2=$('r-pass2').value;
  if(!name){ $('auth-err-reg').textContent='Enter your name'; return; }
  if(!pass){ $('auth-err-reg').textContent='Enter a password'; return; }
  if(pass!==pass2){ $('auth-err-reg').textContent='Passwords do not match'; return; }
  if(pass.length<8){ $('auth-err-reg').textContent='Password must be at least 8 characters'; return; }
  $('auth-err-reg').textContent='';
  const btn=$('r-btn'); btn.disabled=true; btn.textContent='Creating…';
  try{
    await apiJSON('/lc/auth/register',{method:'POST',body:JSON.stringify({name,email,password:pass,passwordConfirm:pass2})});
    await apiJSON('/lc/auth/login',{method:'POST',body:JSON.stringify({email,password:pass})});
    const me=await apiJSON('/lc/auth/me');
    currentUser=me; onLoggedIn();
  }catch(e){
    const msg = e.message||'';
    if(/already|duplicate|exist/i.test(msg)){
      // Account exists — switch to login step
      $('login-email-display').textContent=email;
      showAuthStep('auth-step-login');
      // If Google button is visible, suggest Google login too
      if($('google-btn-wrap').style.display!=='none'){
        $('auth-err-login').innerHTML='Account already exists. Sign in with your password, or <a href="#" id="err-google-link2" style="color:#10a37f">continue with Google</a>.';
        document.getElementById('err-google-link2')?.addEventListener('click',e=>{
          e.preventDefault();
          window.location.href='/lc/auth/oauth-start?provider=google&redirect='+encodeURIComponent(window.location.pathname);
        });
      } else {
        $('auth-err-login').textContent='Account already exists — please sign in';
      }
      $('l-pass').focus();
    } else {
      $('auth-err-reg').textContent=msg;
    }
  }
  finally{ btn.disabled=false; btn.textContent='Create account'; }
}
$('r-btn').addEventListener('click',doRegister);
['r-name','r-pass','r-pass2'].forEach(id=>$(id).addEventListener('keydown',e=>{ if(e.key==='Enter') doRegister(); }));

// Logout
$('logout-btn').addEventListener('click',async()=>{

  currentUser=null; sessions=[]; messages=[]; currentSid=null;

});

// ── SESSIONS ───────────────────────────────────────────────────────────────
async function loadSessions(){
  try{
    const d=await apiJSON('/lc/sessions');
    sessions=d.items||d;
    renderSidebar();
  }catch(e){ toast(e.message); }
}

function groupByDate(list){
  const now=new Date(), today=new Date(now.getFullYear(),now.getMonth(),now.getDate()).getTime();
  const g={'Today':[],'Yesterday':[],'Past 7 days':[],'Older':[]};
  for(const s of list){
    const t=new Date(s.updated||s.created).getTime();
    if(t>=today) g['Today'].push(s);
    else if(t>=today-86400000) g['Yesterday'].push(s);
    else if(t>=today-7*86400000) g['Past 7 days'].push(s);
    else g['Older'].push(s);
  }
  return g;
}

function renderSidebar(){
  const sorted=[...sessions].sort((a,b)=>new Date(b.updated||b.created)-new Date(a.updated||a.created));
  const groups=groupByDate(sorted);
  let html='';
  for(const [label,items] of Object.entries(groups)){
    if(!items.length) continue;
    html+=`<div class="grp-label">${label}</div>`;
    for(const s of items){
      const active=s.id===currentSid?' active':'';
      html+=`<div class="sess-item${active}" data-sid="${s.id}">
        <span class="sess-title">${esc(s.title||'New Chat')}</span>
        <div class="sess-acts">
          <button class="sab" data-act="rename" data-sid="${s.id}" title="Rename">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="sab" data-act="del" data-sid="${s.id}" title="Delete">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
          </button>
        </div>
      </div>`;
    }
  }
  sbList.innerHTML=html;
}

function updateActive(){ document.querySelectorAll('.sess-item').forEach(el=>el.classList.toggle('active',el.dataset.sid===currentSid)) }

async function openSession(id){
  if(isStreaming) return;
  currentSid=id;
  const sess=sessions.find(s=>s.id===id);
  if(sess){ selectedProvider=sess.provider||selectedProvider; selectedModel=sess.model||selectedModel; mdlLabel.textContent=selectedModel; updateCapBar(); }
  updateActive();
  try{
    const d=await apiJSON(`/lc/sessions/${id}/messages`);
    messages=d.items||d;
    renderMessages();
  }catch(e){ toast(e.message); }
}

async function deleteSession(id){
  try{
    await apiJSON(`/lc/sessions/${id}`,{method:'DELETE'});
    sessions=sessions.filter(s=>s.id!==id);
    if(currentSid===id) newChat();
    else renderSidebar();
  }catch(e){ toast(e.message); }
}

function renameSession(id, itemEl){
  const sess=sessions.find(s=>s.id===id); if(!sess) return;
  const titleEl=itemEl.querySelector('.sess-title');
  const inp=document.createElement('input'); inp.className='sess-rename'; inp.value=sess.title||'New Chat';
  titleEl.replaceWith(inp); inp.focus(); inp.select();
  const commit=async()=>{
    const t=inp.value.trim()||sess.title;
    try{ await apiJSON(`/lc/sessions/${id}/title`,{method:'PATCH',body:JSON.stringify({title:t})}); sess.title=t; }catch{}
    renderSidebar(); updateActive();
  };
  inp.addEventListener('blur',commit);
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault();commit();} if(e.key==='Escape'){inp.value=sess.title;commit();} });
}

function newChat(){
  if(isStreaming) return;
  currentSid=null; messages=[];
  while(chatEl.lastChild&&chatEl.lastChild!==emptyEl) chatEl.removeChild(chatEl.lastChild);
  emptyEl.style.display='flex';
  updateActive(); updateSendBtn();
}

// ── MESSAGES ───────────────────────────────────────────────────────────────
function renderMarkdown(el, text){
  const raw=marked.parse(text||'');
  const withHdr=raw.replace(/<pre><code(?: class="language-([^"]*)")?>/g,(_,lang)=>
    `<pre><div class="code-hdr"><span>${lang||'code'}</span><button class="copy-code" onclick="cpCode(this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
      Copy</button></div><code${lang?` class="language-${lang}"`:''}>`);
  el.innerHTML=DOMPurify.sanitize(withHdr,{ADD_ATTR:['onclick'],FORCE_BODY:true});
  el.querySelectorAll('pre code').forEach(b=>{ if(!b.classList.contains('hljs')) hljs.highlightElement(b); });
}
window.cpCode=function(btn){
  const c=btn.closest('pre').querySelector('code'); if(!c) return;
  navigator.clipboard.writeText(c.innerText).then(()=>{ btn.textContent='Copied!'; setTimeout(()=>{ btn.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy`; },1500); });
};

const COPY_SVG=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>`;
const EDIT_SVG=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;

function makeCopyBtn(getText){
  const btn=document.createElement('button'); btn.className='mab'; btn.title='Copy';
  btn.innerHTML=COPY_SVG+' Copy';
  btn.addEventListener('click',()=>{
    navigator.clipboard.writeText(getText()).then(()=>{
      btn.textContent='Copied!';
      setTimeout(()=>{ btn.innerHTML=COPY_SVG+' Copy'; },1500);
    });
  });
  return btn;
}

function appendMsg(role, content, msgId){
  if(emptyEl.style.display!=='none') emptyEl.style.display='none';
  const row=document.createElement('div'); row.className=`msg-row ${role}`;
  if(msgId) row.dataset.msgId=msgId;

  if(role==='user'){
    const b=document.createElement('div'); b.className='user-bub'; b.textContent=content; row.appendChild(b);
    const acts=document.createElement('div'); acts.className='msg-acts';
    // Copy
    acts.appendChild(makeCopyBtn(()=>b.textContent));
    // Edit
    const editBtn=document.createElement('button'); editBtn.className='mab'; editBtn.title='Edit';
    editBtn.innerHTML=EDIT_SVG+' Edit';
    editBtn.addEventListener('click',()=>{
      const txt=b.textContent;
      // Remove this message and all subsequent from DOM + messages array
      const idx=messages.findIndex(m=>m.id===msgId);
      if(idx>=0){
        // Delete from PB in background
        messages.slice(idx).forEach(m=>{ apiJSON(`/lc/messages/${m.id}`,{method:'DELETE'}).catch(()=>{}); });
        messages=messages.slice(0,idx);
        // Remove all DOM rows after and including this one
        let el=row; while(el){ const next=el.nextSibling; el.remove(); el=next; }
      } else {
        row.remove();
      }
      msgIn.value=txt; msgIn.style.height='auto'; msgIn.style.height=Math.min(msgIn.scrollHeight,200)+'px';
      updateSendBtn(); msgIn.focus();
    });
    acts.appendChild(editBtn);
    row.appendChild(acts);
  } else {
    const c=document.createElement('div'); c.className='asst-content';
    if(content) renderMarkdown(c,content);
    row.appendChild(c);
    const acts=document.createElement('div'); acts.className='msg-acts';
    acts.appendChild(makeCopyBtn(()=>c.innerText));
    row.appendChild(acts);
  }
  chatEl.appendChild(row); return row;
}

function renderMessages(){
  while(chatEl.lastChild&&chatEl.lastChild!==emptyEl) chatEl.removeChild(chatEl.lastChild);
  if(!messages.length){ emptyEl.style.display='flex'; return; }
  emptyEl.style.display='none';
  for(const m of messages) appendMsg(m.role,m.content,m.id);
  scrollBot(false);
}

// ── SEND ───────────────────────────────────────────────────────────────────
function updateSendBtn(){
  // During streaming: enable send only if there's content to send (will interrupt + continue)
  sendBtn.disabled=(msgIn.value.trim()===''&&pendingFiles.length===0);
}

async function sendMessage(){
  const text=msgIn.value.trim(); if(!text&&!pendingFiles.length) return;
  // Mid-stream (Claude Code style): interrupt current response, keep partial, then send new message
  if(isStreaming&&abortCtrl){
    abortCtrl.abort();
    // Wait for the abort handler to finish saving the partial response
    await new Promise(r=>setTimeout(r,120));
  }
  isStreaming=true; stopBtn.style.display='flex';
  msgIn.value=''; msgIn.style.height='auto'; updateSendBtn();

  const files=[...pendingFiles]; pendingFiles=[]; fileChips.innerHTML='';
  let userContent=text;
  // Inject text file content inline
  files.filter(f=>f.kind==='text').forEach(f=>{
    const ext=f.name.split('.').pop()||'';
    userContent+=(userContent?'\n\n':'')+`[File: ${f.name}]\n\`\`\`${ext}\n${(f.dataUrl||'').slice(0,12000)}\n\`\`\``;
  });

  // Create session
  if(!currentSid){
    try{
      const sess=await apiJSON('/lc/sessions',{method:'POST',body:JSON.stringify({title:userContent.slice(0,50)||'New Chat',provider:selectedProvider,model:selectedModel})});
      currentSid=sess.id; sessions.unshift(sess); renderSidebar(); updateActive();
    }catch(e){ toast(e.message); isStreaming=false; sendBtn.style.display='flex'; stopBtn.style.display='none'; return; }
  }

  // Save user message
  let userMsg;
  try{
    userMsg=await apiJSON('/lc/messages',{method:'POST',body:JSON.stringify({session:currentSid,role:'user',content:userContent})});
    messages.push(userMsg);
  }catch(e){ toast(e.message); isStreaming=false; sendBtn.style.display='flex'; stopBtn.style.display='none'; return; }

  appendMsg('user',userContent,userMsg.id); scrollBot(false);

  // Truncation notice
  const total=messages.length;
  if(total>40){
    const bar=document.createElement('div'); bar.className='trunc-bar';
    bar.textContent=`Sending last 40 of ${total} messages`; chatEl.appendChild(bar);
  }

  // Typing indicator
  const typRow=document.createElement('div'); typRow.className='msg-row assistant'; typRow.id='typ-row';
  const typBub=document.createElement('div'); typBub.className='typing';
  for(let i=0;i<3;i++){const d=document.createElement('div');d.className='tdot';typBub.appendChild(d);}
  typRow.appendChild(typBub); chatEl.appendChild(typRow); scrollBot(false);

  try{
    const hist=messages.slice(-40);
    const aiMsgs=await buildAiMsgs(hist,files,currentSid);

    // Use Gemini native endpoint if any file_data parts exist (video/PDF)
    const hasFileParts=aiMsgs.some(m=>Array.isArray(m.content)&&m.content.some(p=>p.type==='file_data'));
    const useNative=hasFileParts&&selectedProvider==='gemini';

    const payload={model:selectedModel,messages:aiMsgs,stream:true};
    if(!useNative){
      if(O_SERIES.has(selectedModel)) payload.max_completion_tokens=4096;
      else payload.max_tokens=4096;
    }

    typRow.remove();
    const aRow=appendMsg('assistant','');
    const aEl=aRow.querySelector('.asst-content');
    streamEl=aEl; streamText='';

    abortCtrl=new AbortController();
    const endpoint=useNative?'/lc/chat/gemini-native':`/v1/${selectedProvider}/v1/chat/completions`;
    const res=await fetch(endpoint,{
      method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',
      body:JSON.stringify(payload),signal:abortCtrl.signal,
    });

    if(!res.ok){
      const err=await res.text(); let msg; try{msg=JSON.parse(err).error?.message||err;}catch{msg=err;}
      aRow.remove(); toast('Error: '+msg);
      messages.pop(); // remove user msg since AI failed
      try{ await apiJSON(`/lc/messages/${userMsg.id}`,{method:'DELETE'}); }catch{}
      return;
    }

    const reader=res.body.getReader(); const dec=new TextDecoder(); let buf='';
    let lastRender=0;
    while(true){
      const{done,value}=await reader.read(); if(done) break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split('\n'); buf=lines.pop()||'';
      for(const line of lines){
        if(!line.startsWith('data: ')) continue;
        const data=line.slice(6).trim(); if(data==='[DONE]') continue;
        try{
          const j=JSON.parse(data);
          const delta=j.choices?.[0]?.delta?.content||'';
          if(delta){
            streamText+=delta;
            // Fast path: plain text during streaming (no markdown overhead)
            const now=Date.now();
            if(now-lastRender>80){
              lastRender=now;
              cancelAnimationFrame(rafId);
              rafId=requestAnimationFrame(()=>{
                if(streamEl){
                  // Lightweight: show as pre-wrap text while streaming
                  streamEl.style.whiteSpace='pre-wrap';
                  streamEl.textContent=streamText;
                  scrollBot(false);
                }
              });
            }
          }
        }catch{}
      }
    }
    cancelAnimationFrame(rafId);
    // Final render: full markdown with syntax highlighting
    if(streamEl&&streamText){
      streamEl.style.whiteSpace='';
      renderMarkdown(streamEl,streamText);
    }

    // Save assistant message
    const aMsg=await apiJSON('/lc/messages',{method:'POST',body:JSON.stringify({session:currentSid,role:'assistant',content:streamText})});
    messages.push(aMsg);

    // Update session timestamp
    const sess=sessions.find(s=>s.id===currentSid);
    if(sess){ sess.updated=new Date().toISOString(); renderSidebar(); updateActive(); }

    // Auto-title (after first exchange, if still "New Chat")
    if(messages.length===2&&(sess?.title==='New Chat'||sess?.title===userContent.slice(0,50))){
      autoTitle(currentSid, text);
    }

  }catch(err){
    $('typ-row')?.remove();
    if(err.name==='AbortError'){
      // Interrupted (Claude Code style): keep partial, render cleanly, save to PB
      if(streamEl&&streamText){
        streamEl.style.whiteSpace='';
        renderMarkdown(streamEl,streamText);
        try{
          const aMsg=await apiJSON('/lc/messages',{method:'POST',body:JSON.stringify({session:currentSid,role:'assistant',content:streamText})});
          messages.push(aMsg);
          // Update session timestamp
          const sess=sessions.find(s=>s.id===currentSid);
          if(sess){ sess.updated=new Date().toISOString(); renderSidebar(); updateActive(); }
        }catch{}
      } else if(streamEl&&!streamText){
        streamEl.closest('.msg-row')?.remove();
      }
    } else {
      toast(err.message||'Request failed');
      if(streamEl&&!streamText) streamEl.closest('.msg-row')?.remove();
    }
  }finally{
    isStreaming=false; abortCtrl=null; streamEl=null; streamText='';
    cancelAnimationFrame(rafId);
    stopBtn.style.display='none'; sendBtn.style.display='flex';
    updateSendBtn(); scrollBot(); msgIn.focus();
    document.querySelectorAll('.trunc-bar').forEach(b=>b.remove());
  }
}

async function uploadToPb(f, sessId){
  const form=new FormData();
  form.append('file', f.file, f.name);
  form.append('session', sessId);
  const r=await fetch('/lc/files',{method:'POST',credentials:'same-origin',body:form});
  if(!r.ok) throw new Error(`Upload failed ${r.status}`);
  return r.json(); // {id, url, mime_type, size_bytes}
}

async function buildAiMsgs(msgs, files, sessId){
  const out=msgs.map(m=>({role:m.role,content:m.content}));
  const mediaFiles=files.filter(f=>f.kind!=='text'); // text already injected
  if(!mediaFiles.length||!out.length) return out;
  const last=out[out.length-1];
  if(last.role!=='user') return out;
  const parts=[{type:'text',text:last.content||''}];

  for(const f of mediaFiles){
    if(f.kind==='image'){
      parts.push({type:'image_url',image_url:{url:f.dataUrl}});
    } else if(f.kind==='audio'){
      // OpenAI input_audio format (also accepted by Gemini OpenAI compat)
      const b64=f.dataUrl.split(',')[1]||'';
      const fmt=f.mime.includes('mp3')||f.name.endsWith('.mp3')?'mp3':
                f.mime.includes('wav')||f.name.endsWith('.wav')?'wav':
                f.mime.includes('ogg')||f.name.endsWith('.ogg')?'ogg':
                f.mime.includes('flac')||f.name.endsWith('.flac')?'flac':'wav';
      parts.push({type:'input_audio',input_audio:{data:b64,format:fmt}});
    } else if(f.kind==='video'||f.kind==='pdf'){
      // Only Gemini supports video/PDF natively → upload to PB then Gemini File API
      if(selectedProvider==='gemini'){
        try{
          const pb=await uploadToPb(f, sessId);
          const g=await apiJSON(`/lc/files/gemini-upload/${pb.id}`,{method:'POST'});
          parts.push({type:'file_data',file_data:{mime_type:f.mime,file_uri:g.geminiFileUri}});
        }catch(e){
          parts[0].text+=`\n[Failed to upload ${f.name}: ${e.message}]`;
        }
      } else {
        parts[0].text+=`\n[Attached: ${f.name} — ${f.kind==='pdf'?'PDF':'Video'}: requires Gemini for AI analysis]`;
      }
    }
  }
  last.content=parts.length>1?parts:parts[0].text;
  return out;
}

async function autoTitle(sessId, firstText){
  const prov=providersData.find(p=>p.available&&p.name!=='anthropic');
  if(!prov) return;
  const models=modelsData[prov.name]||[];
  const cheap=models.find(m=>['deepseek-chat','gpt-4.1-nano','gemini-2.5-flash-lite','qwen-turbo'].includes(m.id));
  if(!cheap) return;
  try{
    const r=await fetch(`/v1/${prov.name}/v1/chat/completions`,{
      method:'POST',credentials:'same-origin',
      headers:{'Content-Type':'application/json','X-LumiChat-Internal':'title'},
      body:JSON.stringify({model:cheap.id,messages:[{role:'user',content:`Give a short title (max 5 words) for a chat starting with: "${firstText.slice(0,200)}". Reply with ONLY the title.`}],max_tokens:20,stream:false}),
    });
    if(!r.ok) return;
    const d=await r.json();
    const title=(d.choices?.[0]?.message?.content||'').trim().replace(/^["']|["']$/g,'');
    if(!title) return;
    await apiJSON(`/lc/sessions/${sessId}/title`,{method:'PATCH',body:JSON.stringify({title})});
    const sess=sessions.find(s=>s.id===sessId);
    if(sess){ sess.title=title; renderSidebar(); updateActive(); }
  }catch{}
}

// ── FILES ──────────────────────────────────────────────────────────────────
function fileKind(file){
  if(file.type.startsWith('image/')) return 'image';
  if(file.type.startsWith('video/')) return 'video';
  if(file.type.startsWith('audio/')) return 'audio';
  if(file.type==='application/pdf'||file.name.endsWith('.pdf')) return 'pdf';
  const textExts=/\.(txt|md|csv|json|js|ts|jsx|tsx|py|html|css|xml|yaml|yml|sh|log|c|cpp|java|go|rs|rb|php|swift|kt)$/i;
  if(file.type.startsWith('text/')||textExts.test(file.name)) return 'text';
  return null;
}
function addFile(file){
  const kind=fileKind(file);
  if(!kind){ toast(`Unsupported type: ${file.name}`); return; }
  const maxMB={image:20,video:500,audio:100,pdf:50,text:5};
  if(file.size>maxMB[kind]*1024*1024){ toast(`Too large (max ${maxMB[kind]}MB): ${file.name}`); return; }
  if((kind==='pdf'||kind==='video')&&selectedProvider!=='gemini'){
    toast(`PDF/视频需要切换到 Gemini 模型才能识别`);
    return;
  }
  const obj={name:file.name,mime:file.type||'application/octet-stream',kind,file};
  const reader=new FileReader();
  reader.onload=ev=>{
    obj.dataUrl=ev.target.result; // always store dataUrl
    pendingFiles.push(obj); renderChips(); updateSendBtn();
  };
  if(kind==='text') reader.readAsText(file);
  else reader.readAsDataURL(file);
}

const KIND_ICON={image:'🖼',video:'🎬',audio:'🎵',pdf:'📄',text:'📝'};
const KIND_LABEL={image:'Image',video:'Video',audio:'Audio',pdf:'PDF',text:'Text'};
const rmSvg=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="12" height="12"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
function renderChips(){
  fileChips.innerHTML=pendingFiles.map((f,i)=>{
    const preview=f.kind==='image'&&f.dataUrl
      ?`<img class="fchip-thumb" src="${f.dataUrl}" alt="">`
      :`<div class="fchip-icon">${KIND_ICON[f.kind]||'📎'}</div>`;
    const label=KIND_LABEL[f.kind]||f.kind;
    return `<div class="fchip">${preview}<div class="fchip-info"><span class="fchip-name">${esc(f.name)}</span><span class="fchip-type">${label}</span></div><button class="fchip-rm" data-i="${i}">${rmSvg}</button></div>`;
  }).join('');
}

// ── PROVIDERS / MODELS ────────────────────────────────────────────────────
async function loadProviders(){
  try{ const r=await fetch('/providers',{credentials:'same-origin'}); if(r.ok) providersData=await r.json(); }catch{}
}
async function loadModels(prov){
  if(modelsData[prov]) return;
  try{ const r=await fetch(`/models/${prov}`,{credentials:'same-origin'}); if(r.ok) modelsData[prov]=await r.json(); }catch{}
}
async function buildModelDropdown(){
  const avail=providersData.filter(p=>p.available);
  await Promise.all(avail.map(p=>loadModels(p.name)));
  renderModelDropdown();
}
function renderModelDropdown(){
  const avail=providersData.filter(p=>p.available);
  if(!dropProvider) dropProvider = selectedProvider || (avail[0]?.name);

  // Provider pills row
  let html = '<div class="mdl-provs">';
  for(const prov of avail){
    const isSel = prov.name === dropProvider;
    html += `<button class="mdl-prov-pill${isSel?' sel':''}" data-prov="${prov.name}">${prov.name.charAt(0).toUpperCase()+prov.name.slice(1)}</button>`;
  }
  html += '</div>';

  // Models for selected provider
  const models = modelsData[dropProvider] || [];
  for(const m of models){
    const isSel = m.id===selectedModel && dropProvider===selectedProvider;
    html += `<div class="mdl-opt${isSel?' sel':''}" data-provider="${dropProvider}" data-model="${m.id}">
      <div class="mdl-info"><div class="mdl-name">${esc(m.id)}</div>${m.desc?`<div class="mdl-desc">${esc(m.desc)}</div>`:''}</div>
      ${isSel?`<svg class="mdl-chk" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`:''}
    </div>`;
  }
  mdlDrop.innerHTML=html;
}

function updateCapBar(){
  const bar = $('cap-bar');
  if(!bar) return;
  const caps = getModelCaps(selectedProvider, selectedModel);
  if(!caps.length){ bar.innerHTML=''; return; }
  bar.innerHTML = caps.map(c=>{
    const m = CAP_META[c]; if(!m) return '';
    return `<div class="cap-icon" title="${m.title}"><span>${m.icon}</span><div class="cap-tip">${m.label}<br><span style="color:var(--t3);font-size:11px">${m.title}</span></div></div>`;
  }).join('');
}

function renderSuggestions(){
  const s=[...SUGGESTIONS].sort(()=>Math.random()-.5).slice(0,4);
  suggGrid.innerHTML=s.map(t=>`<button class="sugg-card" data-p="${esc(t)}">${esc(t)}</button>`).join('');
}

// ── EVENTS ────────────────────────────────────────────────────────────────
$('sb-toggle').addEventListener('click',()=>sidebar.classList.toggle('collapsed'));
$('sb-close').addEventListener('click',()=>sidebar.classList.add('collapsed'));
$('new-chat').addEventListener('click',()=>{ newChat(); if(window.innerWidth<640) sidebar.classList.add('collapsed'); });

sbList.addEventListener('click',e=>{
  const act=e.target.closest('[data-act]');
  if(act){ e.stopPropagation(); const{act:a,sid}=act.dataset;
    if(a==='del') deleteSession(sid);
    if(a==='rename') renameSession(sid,act.closest('.sess-item'));
    return;
  }
  const item=e.target.closest('.sess-item');
  if(item){ openSession(item.dataset.sid); if(window.innerWidth<640) sidebar.classList.add('collapsed'); }
});

$('mdl-btn').addEventListener('click',e=>{ e.stopPropagation(); mdlDrop.classList.toggle('open'); if(mdlDrop.classList.contains('open')){ dropProvider=selectedProvider; renderModelDropdown(); } });
mdlDrop.addEventListener('click',e=>{
  const pill=e.target.closest('.mdl-prov-pill');
  if(pill){ dropProvider=pill.dataset.prov; loadModels(dropProvider).then(renderModelDropdown); return; }
  const opt=e.target.closest('.mdl-opt'); if(!opt) return;
  selectedProvider=opt.dataset.provider; selectedModel=opt.dataset.model;
  mdlLabel.textContent=selectedModel; mdlDrop.classList.remove('open'); renderModelDropdown(); updateCapBar();
});
document.addEventListener('click',e=>{ if(!e.target.closest('#mdl-btn')&&!e.target.closest('#mdl-drop')) mdlDrop.classList.remove('open'); });

msgIn.addEventListener('input',()=>{ msgIn.style.height='auto'; msgIn.style.height=Math.min(msgIn.scrollHeight,200)+'px'; updateSendBtn(); });
msgIn.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); if(!sendBtn.disabled) sendMessage(); return; }
  // Escape = interrupt current stream (Claude Code style)
  if(e.key==='Escape'&&isStreaming&&abortCtrl){ abortCtrl.abort(); }
});
sendBtn.addEventListener('click',()=>{ if(!sendBtn.disabled) sendMessage(); });
stopBtn.addEventListener('click',()=>{ if(abortCtrl) abortCtrl.abort(); });
// Keep input always focused during streaming
document.addEventListener('keydown',e=>{
  if(isStreaming&&e.key==='Escape'&&abortCtrl){ abortCtrl.abort(); return; }
  if(!e.metaKey&&!e.ctrlKey&&!e.altKey&&document.activeElement!==msgIn&&
     !['Tab','Escape','F5','Enter'].includes(e.key)&&e.target.tagName!=='INPUT'&&e.target.tagName!=='TEXTAREA'){
    msgIn.focus();
  }
});

$('attach-btn').addEventListener('click',()=>{ fileIn.value=''; fileIn.click(); });
fileIn.addEventListener('change',()=>{ Array.from(fileIn.files).forEach(addFile); fileIn.value=''; });
fileChips.addEventListener('click',e=>{ const b=e.target.closest('.fchip-rm'); if(!b) return; pendingFiles.splice(+b.dataset.i,1); renderChips(); updateSendBtn(); });

suggGrid.addEventListener('click',e=>{ const c=e.target.closest('.sugg-card'); if(!c) return; msgIn.value=c.dataset.p; msgIn.style.height='auto'; msgIn.style.height=Math.min(msgIn.scrollHeight,200)+'px'; updateSendBtn(); msgIn.focus(); });

msgIn.addEventListener('paste',e=>{ for(const item of e.clipboardData?.items||[]) if(item.kind==='file'&&item.type.startsWith('image/')) addFile(item.getAsFile()); });

// ── GOOGLE OAUTH ─────────────────────────────────────────────────────────
async function initGoogleOAuth(){
  try{
    const r=await fetch('/lc/auth/methods',{credentials:'same-origin'});
    if(!r.ok) return;
    const d=await r.json();
    if(d.google){
      $('google-btn-wrap').style.display='';
      $('google-btn').addEventListener('click',()=>{
        window.location.href='/lc/auth/oauth-start?provider=google&redirect='+encodeURIComponent(window.location.pathname);
      });
    }
  }catch{}
}

// Handle OAuth callback (?oauth=1 or ?oauth_err=...)
(function handleOAuthReturn(){
  const p=new URLSearchParams(window.location.search);
  history.replaceState(null,'',window.location.pathname);
  if(p.get('oauth_err')){
    // Show error on auth screen after page loads
    setTimeout(()=>{ const el=$('auth-err'); if(el) el.textContent='Google login failed: '+decodeURIComponent(p.get('oauth_err')); },300);
  }
  // oauth=1: session cookie already set, tryRestoreSession will pick it up
})();

// ── BOOT ──────────────────────────────────────────────────────────────────
initGoogleOAuth();
tryRestoreSession();
