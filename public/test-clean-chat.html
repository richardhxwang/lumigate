<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clean Chat API Test</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,system-ui,sans-serif; background:#1a1a1a; color:#e0e0e0; padding:20px; }
  h1 { font-size:18px; margin-bottom:16px; color:#10a37f; }
  .row { display:flex; gap:10px; margin-bottom:10px; flex-wrap:wrap; }
  select,input,button { font-size:14px; padding:8px 12px; border-radius:8px; border:1px solid #444; background:#2a2a2a; color:#e0e0e0; }
  button { background:#10a37f; color:#fff; border:none; cursor:pointer; font-weight:600; }
  button:hover { background:#0d9268; }
  button:disabled { opacity:.5; cursor:default; }
  #output { background:#111; border:1px solid #333; border-radius:12px; padding:16px; margin-top:12px; min-height:200px; white-space:pre-wrap; font-size:14px; line-height:1.6; overflow-y:auto; max-height:70vh; }
  .status { color:#888; font-size:13px; font-style:italic; display:block; margin:4px 0; }
  .file-card { background:#2a2a2a; border:1px solid #444; border-radius:8px; padding:10px 14px; margin:8px 0; display:flex; align-items:center; gap:10px; }
  .file-card a { color:#10a37f; font-weight:600; text-decoration:none; }
  .error { color:#f44; }
  .meta { color:#666; font-size:12px; margin-top:8px; }
  #presets { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
  #presets button { font-size:12px; padding:4px 10px; background:#333; }
  #presets button:hover { background:#444; }
</style>
</head>
<body>
<h1>POST /v1/chat — Clean Proxy Test</h1>

<div class="row">
  <select id="provider">
    <option value="deepseek">DeepSeek</option>
    <option value="openai">OpenAI</option>
    <option value="gemini">Gemini</option>
    <option value="anthropic">Anthropic</option>
    <option value="qwen">Qwen</option>
    <option value="minimax">MiniMax</option>
  </select>
  <select id="model">
    <option value="deepseek-chat">deepseek-chat</option>
    <option value="gpt-4.1-nano">gpt-4.1-nano</option>
    <option value="gpt-4.1-mini">gpt-4.1-mini</option>
    <option value="gemini-2.5-flash">gemini-2.5-flash</option>
    <option value="claude-haiku-4-5-20251001">claude-haiku-4.5</option>
    <option value="qwen-plus">qwen-plus</option>
    <option value="MiniMax-Text-01">MiniMax-Text-01</option>
  </select>
  <label style="display:flex;align-items:center;gap:4px;font-size:13px;">
    <input type="checkbox" id="stream" checked> Stream
  </label>
</div>

<div id="presets">
  <button onclick="setMsg('你好，一句话介绍你自己')">普通对话</button>
  <button onclick="setMsg('搜索今天AI最新新闻')">搜索</button>
  <button onclick="setMsg('生成一个Excel：Q1销售数据，3个月，收入/成本/利润')">生成 Excel</button>
  <button onclick="setMsg('生成Word文档：项目周报，本周完成了用户系统重构')">生成 Word</button>
  <button onclick="setMsg('latest news about Apple today')">英文搜索</button>
  <button onclick="setMsg('解释什么是递归')">不触发搜索</button>
</div>

<div class="row">
  <input id="msg" style="flex:1" placeholder="输入消息..." value="你好，一句话介绍你自己">
  <button id="send" onclick="send()">发送</button>
</div>

<div id="output"></div>
<div id="meta" class="meta"></div>

<script>
const API = ''; // 同源，相对路径即可（公网 Cloudflare Access 会自动处理认证）
const KEY = 'pk_1bda50eec9b4bee2a514647fa8a8c8f3db35ae66d87e3256';
const out = document.getElementById('output');
const meta = document.getElementById('meta');
let ctrl = null;

function setMsg(t) { document.getElementById('msg').value = t; }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

async function send() {
  const msg = document.getElementById('msg').value.trim();
  if (!msg) return;
  const provider = document.getElementById('provider').value;
  const model = document.getElementById('model').value;
  const doStream = document.getElementById('stream').checked;

  out.innerHTML = '';
  meta.textContent = '';
  document.getElementById('send').disabled = true;
  ctrl = new AbortController();

  const t0 = Date.now();
  let charCount = 0;

  try {
    const res = await fetch(`${API}/v1/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Project-Key': KEY },
      body: JSON.stringify({ provider, model, messages: [{ role: 'user', content: msg }], stream: doStream }),
      signal: ctrl.signal,
    });

    if (!res.ok) {
      const err = await res.text();
      out.innerHTML = `<span class="error">HTTP ${res.status}: ${esc(err)}</span>`;
      return;
    }

    if (!doStream) {
      const data = await res.json();
      const content = data.choices?.[0]?.message?.content || '';
      charCount = content.length;
      out.textContent = content;
      if (data.tool_results) {
        for (const tr of data.tool_results) {
          if (tr.filename) appendFileCard(tr);
        }
      }
      // 检查有没有标记泄露
      checkLeaks(content);
    } else {
      // SSE 流式
      const reader = res.body.getReader();
      const dec = new TextDecoder();
      let buf = '', evtType = '', fullText = '';
      const textNode = document.createTextNode('');
      out.appendChild(textNode);

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += dec.decode(value, { stream: true });
        const lines = buf.split('\n');
        buf = lines.pop() || '';

        for (const line of lines) {
          if (line.startsWith('event: ')) { evtType = line.slice(7).trim(); continue; }
          if (!line.startsWith('data: ')) { if (line === '') evtType = ''; continue; }
          const data = line.slice(6).trim();
          if (data === '[DONE]') continue;

          // tool_status
          if (evtType === 'tool_status') {
            try {
              const st = JSON.parse(data);
              let el = out.querySelector('.status:last-of-type');
              if (st.done) { if (el) el.remove(); }
              else {
                if (!el || el.dataset.done === '1') {
                  el = document.createElement('span');
                  el.className = 'status';
                  out.insertBefore(el, textNode);
                }
                el.textContent = st.text;
              }
            } catch {}
            evtType = ''; continue;
          }

          // file_download
          if (evtType === 'file_download') {
            try { appendFileCard(JSON.parse(data)); } catch {}
            evtType = ''; continue;
          }

          // 普通文字
          evtType = '';
          try {
            const j = JSON.parse(data);
            const delta = j.choices?.[0]?.delta?.content || '';
            if (delta) { fullText += delta; textNode.data = fullText; charCount += delta.length; }
          } catch {}
        }
      }
      // 检查泄露
      checkLeaks(fullText);
    }
  } catch (e) {
    if (e.name !== 'AbortError') out.innerHTML += `\n<span class="error">Error: ${esc(e.message)}</span>`;
  } finally {
    document.getElementById('send').disabled = false;
    const elapsed = Date.now() - t0;
    meta.textContent = `${charCount} 字 · ${elapsed}ms · ${(charCount / (elapsed / 1000)).toFixed(0)} 字/s`;
  }
}

function appendFileCard(fd) {
  const fn = fd.filename || 'file';
  const size = fd.size ? (fd.size > 1048576 ? (fd.size/1048576).toFixed(1)+' MB' : (fd.size/1024).toFixed(1)+' KB') : '';
  let url = fd.downloadUrl || '';
  if (!url && fd.base64) {
    const bin = atob(fd.base64);
    const arr = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
    url = URL.createObjectURL(new Blob([arr], { type: fd.mimeType || 'application/octet-stream' }));
  }
  const card = document.createElement('div');
  card.className = 'file-card';
  card.innerHTML = `<span>${esc(fn)} (${size})</span> <a href="${esc(url)}" download="${esc(fn)}">下载</a>`;
  out.appendChild(card);
}

function checkLeaks(text) {
  const leaks = [];
  if (/\[TOOL:\w+\]/.test(text)) leaks.push('[TOOL:] 标记');
  if (/<(?:｜DSML｜|︱DSML︱|\|DSML\|)/.test(text)) leaks.push('DSML 标记');
  if (/<(?:minimax:)?tool_call>/.test(text)) leaks.push('XML tool_call 标记');
  if (/<invoke\s/.test(text)) leaks.push('<invoke> 标记');
  if (leaks.length) {
    const warn = document.createElement('div');
    warn.className = 'error';
    warn.textContent = '⚠ 标记泄露: ' + leaks.join(', ');
    out.appendChild(warn);
  }
}

document.getElementById('msg').addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });
</script>
</body>
</html>
