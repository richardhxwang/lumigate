<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LumiTrade</title>
  <script nonce="{{NONCE}}">(function(){try{var t=localStorage.getItem('lt_theme');if(t==='light')document.documentElement.classList.add('light');}catch(e){}})()</script>
  <style nonce="{{NONCE}}">
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --sb: #171717; --bg: #212121; --inp: #2f2f2f;
      --t1: #ececec; --t2: #8e8e8e; --t3: #505050;
      --accent: #10a37f; --accent-h: #0d9268;
      --border: #2a2a2a;
      --green: #22c55e; --red: #ef4444; --yellow: #eab308;
      --r1: 8px; --r2: 12px; --r3: 16px; --r4: 20px; --r5: 26px;
      --header-h: 44px;
    }
    :root.light {
      --sb: #f7f7f8; --bg: #ffffff; --inp: #f4f4f5;
      --t1: #0d0d0d; --t2: #555; --t3: #999;
      --border: #e5e5e5;
    }
    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--t1);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }

    /* ── SPLASH ── */
    #splash { position: fixed; inset: 0; background: var(--bg); z-index: 500;
      display: flex; align-items: center; justify-content: center;
      transition: opacity .5s ease, visibility .5s; }
    #splash.out { opacity: 0; visibility: hidden; pointer-events: none; }
    #splash-scene { display: flex; flex-direction: column; align-items: center; gap: 18px; }
    #splash-ball { display: block; animation: ball-drop 1.5s ease forwards;
      transform-origin: center bottom; will-change: transform; }
    #splash-title { font-size: 26px; font-weight: 700; color: var(--t1);
      letter-spacing: -.3px; opacity: 0; animation: splash-title-in .5s ease forwards; animation-delay: 1.1s; }
    .splash-accent { color: var(--accent); }
    @keyframes ball-drop {
      0%   { transform: translate3d(0,-300px,0); animation-timing-function: cubic-bezier(.55,0,1,.45) }
      36%  { transform: translate3d(0,0,0) scaleY(.91) scaleX(1.09); animation-timing-function: cubic-bezier(0,.55,.45,1) }
      52%  { transform: translate3d(0,-90px,0); animation-timing-function: cubic-bezier(.55,0,1,.45) }
      65%  { transform: translate3d(0,0,0) scaleY(.95) scaleX(1.05); animation-timing-function: cubic-bezier(0,.55,.45,1) }
      74%  { transform: translate3d(0,-34px,0); animation-timing-function: cubic-bezier(.55,0,1,.45) }
      82%  { transform: translate3d(0,0,0) scaleY(.98) scaleX(1.02); animation-timing-function: ease-out }
      88%  { transform: translate3d(0,-6px,0) }
      100% { transform: translate3d(0,0,0) }
    }
    @keyframes splash-title-in { from { opacity:0; transform:translateY(8px) } to { opacity:1; transform:translateY(0) } }

    /* ── HEADER ── */
    #header { height: var(--header-h); background: rgba(23,23,23,.85);
      backdrop-filter: blur(20px) saturate(160%); -webkit-backdrop-filter: blur(20px) saturate(160%);
      border-bottom: 1px solid rgba(255,255,255,.06);
      display: flex; align-items: center; padding: 0 16px; gap: 12px; flex-shrink: 0; z-index: 10; position: relative; }
    :root.light #header { background: rgba(255,255,255,.85); border-bottom-color: rgba(0,0,0,.08); }
    .hd-logo { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 700; letter-spacing: -.3px; }
    .hd-logo svg { width: 20px; height: 20px; color: var(--accent); }
    .hd-spacer { flex: 1; }
    .hd-status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--t2); }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; }
    .status-dot.ok { background: var(--green); box-shadow: 0 0 6px rgba(34,197,94,.5); }
    .status-dot.err { background: var(--red); }
    .hd-btn { width: 32px; height: 32px; border: none; background: transparent; color: var(--t2);
      cursor: pointer; border-radius: var(--r1); display: flex; align-items: center; justify-content: center;
      transition: background .15s, color .15s; }
    .hd-btn:hover { background: rgba(255,255,255,.08); color: var(--t1); }
    :root.light .hd-btn:hover { background: rgba(0,0,0,.06); }
    .hd-btn svg { width: 16px; height: 16px; }

    /* ── FREQUI IFRAME ── */
    #frequi-frame { width: 100%; height: calc(100vh - var(--header-h)); border: none; }

    /* ── FLOATING LUMICHAT ── */
    #chat-toggle { position: fixed; bottom: 24px; right: 24px; width: 48px; height: 48px;
      border-radius: 50%; border: 1px solid rgba(255,255,255,.12); z-index: 900;
      background: rgba(30,30,30,.8); backdrop-filter: blur(16px) saturate(160%);
      -webkit-backdrop-filter: blur(16px) saturate(160%);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: var(--t1); transition: transform .15s, box-shadow .15s;
      box-shadow: 0 4px 20px rgba(0,0,0,.4); }
    :root.light #chat-toggle { background: rgba(255,255,255,.85); border-color: rgba(0,0,0,.1);
      box-shadow: 0 4px 20px rgba(0,0,0,.12); }
    #chat-toggle:hover { transform: scale(1.06); }
    #chat-toggle:active { transform: scale(0.94); }
    #chat-toggle svg { width: 20px; height: 20px; }

    #chat-panel { position: fixed; bottom: 84px; right: 24px; width: 420px; height: 560px;
      min-width: 320px; min-height: 300px; z-index: 899;
      background: rgba(23,23,23,.92); backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      border: 1px solid rgba(255,255,255,.1); border-radius: var(--r4);
      box-shadow: 0 24px 80px rgba(0,0,0,.6);
      display: none; flex-direction: column; overflow: hidden; resize: both; }
    :root.light #chat-panel { background: rgba(255,255,255,.94); border-color: rgba(0,0,0,.08);
      box-shadow: 0 24px 80px rgba(0,0,0,.18); }
    #chat-panel.open { display: flex; }
    .cp-header { height: 40px; display: flex; align-items: center; padding: 0 12px; gap: 8px;
      border-bottom: 1px solid rgba(255,255,255,.07); cursor: grab; flex-shrink: 0;
      user-select: none; -webkit-user-select: none; }
    :root.light .cp-header { border-bottom-color: rgba(0,0,0,.07); }
    .cp-header:active { cursor: grabbing; }
    .cp-title { flex: 1; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
    .cp-title svg { width: 14px; height: 14px; color: var(--accent); }
    .cp-btn { width: 26px; height: 26px; border: none; background: transparent; color: var(--t2);
      cursor: pointer; border-radius: var(--r1); display: flex; align-items: center; justify-content: center; }
    .cp-btn:hover { background: rgba(255,255,255,.1); color: var(--t1); }
    .cp-btn svg { width: 14px; height: 14px; }
    .cp-body { flex: 1; }
    .cp-body iframe { width: 100%; height: 100%; border: none; border-radius: 0 0 var(--r4) var(--r4); }
  </style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div id="splash-scene">
    <svg id="splash-ball" viewBox="0 0 40 40" width="64" height="64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="20" cy="20" r="20" fill="#10a37f"/>
      <polyline points="10 26 17 18 23 22 30 14" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <polyline points="25 14 30 14 30 19" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div id="splash-title">Lumi<span class="splash-accent">Trade</span></div>
  </div>
</div>

<!-- HEADER (frosted glass overlay) -->
<div id="header">
  <div class="hd-logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
      <polyline points="16 7 22 7 22 13"/>
    </svg>
    <span>Lumi<span class="splash-accent">Trade</span></span>
  </div>
  <div class="hd-status">
    <span class="status-dot ok" id="ft-dot"></span>
    <span>Freqtrade</span>
  </div>
  <div class="hd-spacer"></div>
  <button class="hd-btn" id="theme-btn" title="Toggle theme">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
  </button>
</div>

<!-- FREQUI (real trading dashboard) -->
<div id="frequi-wrap" style="width:100%;height:calc(100vh - var(--header-h));position:relative;">
  <div id="frequi-loading" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:1;">
    <span style="color:var(--t2);font-size:13px;">Connecting to Freqtrade...</span>
  </div>
  <iframe id="frequi-frame" style="width:100%;height:100%;border:none;position:relative;z-index:2;opacity:0;transition:opacity .3s;" title="FreqUI"></iframe>
</div>

<!-- FLOATING LUMICHAT -->
<button id="chat-toggle" title="Open LumiChat">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
  </svg>
</button>
<div id="chat-panel">
  <div class="cp-header" id="cp-drag">
    <span class="cp-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      LumiChat
    </span>
    <button class="cp-btn" id="cp-min" title="Minimize">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
    <button class="cp-btn" id="cp-close" title="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="cp-body">
    <iframe src="/lumichat" title="LumiChat"></iframe>
  </div>
</div>

<script nonce="{{NONCE}}">
(function(){
  'use strict';

  // Splash — hide after animation
  setTimeout(function(){
    var sp = document.getElementById('splash');
    if(sp){ sp.classList.add('out'); setTimeout(function(){ sp.remove(); }, 600); }
  }, 2200);

  // Theme toggle
  var themeBtn = document.getElementById('theme-btn');
  themeBtn.addEventListener('click', function(){
    var isLight = document.documentElement.classList.toggle('light');
    localStorage.setItem('lt_theme', isLight ? 'light' : 'dark');
  });

  // LumiChat floating panel
  var chatToggle = document.getElementById('chat-toggle');
  var chatPanel = document.getElementById('chat-panel');
  chatToggle.addEventListener('click', function(){ chatPanel.classList.toggle('open'); });
  document.getElementById('cp-min').addEventListener('click', function(){ chatPanel.classList.remove('open'); });
  document.getElementById('cp-close').addEventListener('click', function(){ chatPanel.classList.remove('open'); });

  // Drag
  var isDragging = false, dx = 0, dy = 0;
  document.getElementById('cp-drag').addEventListener('mousedown', function(e){
    if(e.target.closest('.cp-btn')) return;
    isDragging = true;
    var r = chatPanel.getBoundingClientRect();
    dx = e.clientX - r.left; dy = e.clientY - r.top;
    e.preventDefault();
  });
  document.addEventListener('mousemove', function(e){
    if(!isDragging) return;
    chatPanel.style.left = (e.clientX - dx) + 'px';
    chatPanel.style.top = (e.clientY - dy) + 'px';
    chatPanel.style.right = 'auto';
    chatPanel.style.bottom = 'auto';
  });
  document.addEventListener('mouseup', function(){ isDragging = false; });

  // ── FreqUI auto-login ──
  // FreqUI stores auth in localStorage under "ftAuthLoginInfo" (object keyed by botId)
  // and selected bot under "ftSelectedBot". Since /frequi/ is same-origin (nginx proxy),
  // we share localStorage. Server endpoint /lumitrade/frequi-token handles the login
  // (password stays server-side), we inject the returned JWT tokens into localStorage,
  // then load the FreqUI iframe which finds the tokens and skips the login screen.
  var FT_BOT_ID = '0';
  var FT_BOT_NAME = 'LumiTrade-Crypto';
  var FT_API_URL = window.location.origin + '/frequi';

  function ftSetStatus(ok) {
    var dot = document.getElementById('ft-dot');
    if (ok) { dot.classList.add('ok'); dot.classList.remove('err'); }
    else    { dot.classList.add('err'); dot.classList.remove('ok'); }
  }

  function ftShowFrame() {
    var frame = document.getElementById('frequi-frame');
    var loading = document.getElementById('frequi-loading');
    frame.style.opacity = '1';
    if (loading) loading.style.display = 'none';
  }

  function ftLoadFrame() {
    var frame = document.getElementById('frequi-frame');
    frame.onload = function() { ftShowFrame(); };
    frame.src = '/frequi/';
  }

  function ftInjectAuthAndLoad(accessToken, refreshToken) {
    // Build the auth object FreqUI expects in localStorage
    var authInfo = {};
    try { authInfo = JSON.parse(localStorage.getItem('ftAuthLoginInfo') || '{}'); } catch(e) {}
    authInfo[FT_BOT_ID] = {
      botName: FT_BOT_NAME,
      apiUrl: FT_API_URL,
      username: 'freqtrader',
      accessToken: accessToken,
      refreshToken: refreshToken,
      autoRefresh: true,
      sortId: 0
    };
    localStorage.setItem('ftAuthLoginInfo', JSON.stringify(authInfo));
    localStorage.setItem('ftSelectedBot', FT_BOT_ID);

    // Now load FreqUI — it will find the tokens and skip the login screen
    ftLoadFrame();
  }

  function ftLogin() {
    // First check if we already have a valid token in localStorage
    var existing = null;
    try { existing = JSON.parse(localStorage.getItem('ftAuthLoginInfo') || '{}'); } catch(e) {}
    if (existing && existing[FT_BOT_ID] && existing[FT_BOT_ID].accessToken) {
      // Verify the existing token still works via a lightweight ping
      fetch('/frequi/api/v1/ping', {
        headers: { 'Authorization': 'Bearer ' + existing[FT_BOT_ID].accessToken }
      }).then(function(r) {
        if (r.ok) {
          ftSetStatus(true);
          ftLoadFrame();
          return;
        }
        ftDoLogin();
      }).catch(function() { ftDoLogin(); });
      return;
    }
    ftDoLogin();
  }

  function ftDoLogin() {
    // Server-side token exchange — password never leaves the server
    fetch('/lumitrade/frequi-token', { method: 'POST' })
      .then(function(r) {
        if (!r.ok) throw new Error('Token exchange failed: ' + r.status);
        return r.json();
      })
      .then(function(d) {
        if (d.access_token && d.refresh_token) {
          ftSetStatus(true);
          ftInjectAuthAndLoad(d.access_token, d.refresh_token);
        } else {
          throw new Error('No tokens in response');
        }
      })
      .catch(function(err) {
        console.error('FreqUI auto-login failed:', err);
        ftSetStatus(false);
        // Fall back: load FreqUI anyway (user will see login screen)
        ftLoadFrame();
      });
  }

  // Kick off auto-login
  ftLogin();

})();
</script>
</body>
</html>
