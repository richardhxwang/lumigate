  <line x1="16" y1="16" x2="26" y2="6" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
  <line x1="16" y1="16" x2="6" y2="26" stroke="url(#g)" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
