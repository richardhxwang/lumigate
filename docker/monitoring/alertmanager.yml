global:
  resolve_timeout: 2m

route:
  group_by: ["alertname", "compose_service", "severity"]
  group_wait: 15s
  group_interval: 2m
  repeat_interval: 30m
  receiver: "telegram-default"
  routes:
    # Critical alerts: immediate delivery, short repeat
    - match:
        severity: critical
      receiver: "telegram-critical"
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 10m
      continue: true
    # Critical also fires webhook for external integration
    - match:
        severity: critical
      receiver: "webhook-critical"
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 10m
    # Warning alerts: batched, longer repeat
    - match:
        severity: warning
      receiver: "telegram-default"
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 10m

receivers:
  - name: "telegram-critical"
    telegram_configs:
      - bot_token: "${TELEGRAM_BOT_TOKEN}"
        chat_id: "${TELEGRAM_CHAT_ID}"
        parse_mode: "HTML"
        send_resolved: true
        message: |
          {{ if eq .Status "resolved" }}🟢 <b>已恢复: {{ .CommonLabels.alertname }}</b>

          <b>服务</b>: {{ .CommonLabels.compose_service }} ({{ .CommonLabels.component }})
          告警已自动恢复，服务运行正常。

          恢复时间: {{ .EndsAt }}
          {{ else }}🔴 <b>严重告警: {{ .CommonAnnotations.summary }}</b>

          <b>问题</b>: {{ .CommonAnnotations.description }}
          <b>服务</b>: {{ .CommonLabels.compose_service }} ({{ .CommonLabels.component }})
          {{- if .CommonAnnotations.suggested_fix }}
          <b>建议</b>: {{ .CommonAnnotations.suggested_fix }}
          {{- end }}

          触发时间: {{ .StartsAt }}
          {{ end }}

  - name: "telegram-default"
    telegram_configs:
      - bot_token: "${TELEGRAM_BOT_TOKEN}"
        chat_id: "${TELEGRAM_CHAT_ID}"
        parse_mode: "HTML"
        send_resolved: true
        message: |
          {{ if eq .Status "resolved" }}🟢 <b>已恢复: {{ .CommonLabels.alertname }}</b>

          <b>服务</b>: {{ .CommonLabels.compose_service }} ({{ .CommonLabels.component }})
          告警已自动恢复，服务运行正常。

          恢复时间: {{ .EndsAt }}
          {{ else }}🟡 <b>警告: {{ .CommonAnnotations.summary }}</b>

          <b>问题</b>: {{ .CommonAnnotations.description }}
          <b>服务</b>: {{ .CommonLabels.compose_service }} ({{ .CommonLabels.component }})
          {{- if .CommonAnnotations.suggested_fix }}
          <b>建议</b>: {{ .CommonAnnotations.suggested_fix }}
          {{- end }}

          触发时间: {{ .StartsAt }}
          {{ end }}

  - name: "webhook-critical"
    webhook_configs:
      - url: "${ALERT_WEBHOOK_URL}"
        send_resolved: true

  - name: "local-default"
