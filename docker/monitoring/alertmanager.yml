global:
  resolve_timeout: 2m

route:
  group_by: ["alertname", "compose_service", "severity"]
  group_wait: 15s
  group_interval: 2m
  repeat_interval: 30m
  receiver: "telegram-default"
  routes:
    # Critical alerts: immediate delivery, short repeat
    - match:
        severity: critical
      receiver: "telegram-critical"
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 10m
      continue: true
    # Critical also fires webhook for external integration
    - match:
        severity: critical
      receiver: "webhook-critical"
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 10m
    # Warning alerts: batched, longer repeat
    - match:
        severity: warning
      receiver: "telegram-default"
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 10m

receivers:
  - name: "telegram-critical"
    telegram_configs:
      - bot_token: "${TELEGRAM_BOT_TOKEN}"
        chat_id: "${TELEGRAM_CHAT_ID}"
        parse_mode: "HTML"
        send_resolved: true
        message: |
          🔴 <b>[CRITICAL] {{ .CommonLabels.alertname }}</b>
          service={{ .CommonLabels.compose_service }}
          component={{ .CommonLabels.component }}
          {{ .CommonAnnotations.summary }}

          {{- if .CommonAnnotations.description }}
          {{ .CommonAnnotations.description }}
          {{- end }}

          StartsAt: {{ .StartsAt }}
          Status: {{ .Status }}

  - name: "telegram-default"
    telegram_configs:
      - bot_token: "${TELEGRAM_BOT_TOKEN}"
        chat_id: "${TELEGRAM_CHAT_ID}"
        parse_mode: "HTML"
        send_resolved: true
        message: |
          <b>[LumiGate Alert]</b>
          <b>{{ .CommonLabels.alertname }}</b>
          severity={{ .CommonLabels.severity }}
          service={{ .CommonLabels.compose_service }}
          {{ .CommonAnnotations.summary }}

          {{- if .CommonAnnotations.description }}
          {{ .CommonAnnotations.description }}
          {{- end }}

          StartsAt: {{ .StartsAt }}
          Status: {{ .Status }}

  - name: "webhook-critical"
    webhook_configs:
      - url: "${ALERT_WEBHOOK_URL}"
        send_resolved: true

  - name: "local-default"
