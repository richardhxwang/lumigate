groups:
  - name: lumigate-log-errors
    interval: 30s
    rules:
      - alert: LumiGateNetworkError
        expr: sum(count_over_time({compose_service="lumigate"} |= "network error" [2m])) > 0
        for: 30s
        labels:
          severity: warning
          component: lumigate
        annotations:
          summary: "网络连接异常"
          description: "LumiGate 在过去 2 分钟内出现网络错误，可能影响 AI 请求转发。"
          suggested_fix: "检查上游 AI 提供商连通性，确认 DNS 解析正常，查看是否有防火墙或代理拦截。"

      - alert: LumiGateBadRequestProvider
        expr: sum(count_over_time({compose_service="lumigate"} |= "Bad request to AI provider" [3m])) > 0
        for: 30s
        labels:
          severity: warning
          component: lumigate
        annotations:
          summary: "AI 提供商请求失败"
          description: "LumiGate 向上游 AI 提供商发送的请求被拒绝（Bad Request），过去 3 分钟内有错误记录。"
          suggested_fix: "检查请求参数格式是否正确，确认 API Key 有效，查看提供商是否有 API 变更或限流。"

      - alert: LumiGateUrlExtractFallback
        expr: sum(count_over_time({compose_service="lumigate"} |= "\"msg\":\"Tool fallback emitted\"" |= "\"fallbackType\":\"url_extract_failed\"" [3m])) > 0
        for: 45s
        labels:
          severity: warning
          component: lumigate
        annotations:
          summary: "URL 提取降级"
          description: "网页内容提取工具触发了降级回退，过去 3 分钟内 URL 解析失败。"
          suggested_fix: "检查 Collector (Chrome CDP) 是否正常运行，目标网页是否可访问，确认网络出口无限制。"

      - alert: LumiChatEncryptedPackFailed
        expr: sum(count_over_time({compose_service="lumigate"} |= "\"component\":\"lumichat-client\"" |= "\"msg\":\"encrypted_pack_failed\"" [3m])) > 0
        for: 20s
        labels:
          severity: warning
          component: lumichat
        annotations:
          summary: "加密上传打包失败"
          description: "LumiChat 客户端加密文件打包失败，用户上传功能受影响。"
          suggested_fix: "检查客户端浏览器兼容性，确认 SubtleCrypto API 可用，查看文件大小是否超限。"

      - alert: LumiChatFileUploadFailed
        expr: sum(count_over_time({compose_service="lumigate"} |= "\"component\":\"lumichat-client\"" |= "\"msg\":\"file_upload_failed\"" [3m])) > 0
        for: 20s
        labels:
          severity: warning
          component: lumichat
        annotations:
          summary: "文件上传失败"
          description: "LumiChat 客户端文件上传失败，用户无法发送附件。"
          suggested_fix: "检查服务端 /platform/parse 接口是否正常，确认文件大小未超过 10MB 限制，查看 file-parser 服务状态。"

  - name: lumigate-infrastructure
    interval: 30s
    rules:
      # OOM risk: container logging memory pressure indicators
      - alert: LumiGateOOMRisk
        expr: sum(count_over_time({compose_service="lumigate"} |~ "(?i)(heap|memory|oom|allocation failed|out of memory|ENOMEM|JavaScript heap)" [2m])) > 0
        for: 1m
        labels:
          severity: critical
          component: lumigate
        annotations:
          summary: "OOM 风险"
          description: "LumiGate 服务内存使用过高，检测到内存相关错误，可能即将 OOM 崩溃。"
          suggested_fix: "检查是否有内存泄漏，考虑重启服务或增加容器内存限制。运行 docker stats 查看实时内存占用。"

      # High latency: slow request warnings
      - alert: LumiGateHighLatency
        expr: sum(count_over_time({compose_service="lumigate"} |= "\"level\":\"warn\"" |~ "(?i)(slow|timeout|took \\d{4,}ms|latency)" [5m])) > 3
        for: 5m
        labels:
          severity: warning
          component: lumigate
        annotations:
          summary: "请求延迟过高"
          description: "过去 5 分钟内出现多次慢请求或超时，用户体验可能受影响。"
          suggested_fix: "检查上游 AI 提供商响应速度，确认服务器 CPU/内存负载正常，查看是否有大量并发请求。"

      # Collector down: collector health failures
      - alert: CollectorDown
        expr: sum(count_over_time({compose_service="lumigate"} |~ "(?i)(collector.*(unavailable|down|failed|error|unhealthy)|CDP.*(error|refused|timeout))" [2m])) > 0
        for: 2m
        labels:
          severity: critical
          component: collector
        annotations:
          summary: "Collector 服务宕机"
          description: "Chrome CDP (Collector) 健康检查连续失败超过 2 分钟，网页抓取和 URL 提取功能不可用。"
          suggested_fix: "运行 docker compose restart collector 重启服务，检查 Chrome 进程是否僵死，确认内存是否充足。"

      # PocketBase unavailable
      - alert: PocketBaseUnavailable
        expr: sum(count_over_time({compose_service="lumigate"} |~ "(?i)(pocketbase.*(unavailable|refused|timeout|ECONNREFUSED)|PB.*(error|failed|unreachable))" [1m])) > 0
        for: 1m
        labels:
          severity: critical
          component: pocketbase
        annotations:
          summary: "PocketBase 数据库不可用"
          description: "PocketBase 连接失败超过 1 分钟，用户认证和数据持久化功能完全中断。"
          suggested_fix: "检查 PocketBase 容器是否运行中 (docker ps)，查看磁盘空间是否充足，尝试 docker compose restart pocketbase。"

      # Error rate spike: high volume of error-level log entries
      - alert: ErrorRateSpike
        expr: |
          sum(count_over_time({compose_service="lumigate"} |= "\"level\":\"error\"" [3m])) /
          (sum(count_over_time({compose_service="lumigate"} [3m])) > 0) > 0.05
        for: 3m
        labels:
          severity: critical
          component: lumigate
        annotations:
          summary: "错误率飙升"
          description: "LumiGate 过去 3 分钟内错误日志占比超过 5%，服务可能存在系统性故障。"
          suggested_fix: "查看最近错误日志定位根因 (docker logs lumigate --tail 100)，检查是否有配置变更或上游故障。"

      # 5xx rate spike (via nginx access logs)
      - alert: Http5xxRateSpike
        expr: |
          sum(count_over_time({compose_service="nginx"} |~ "\" 5\\d{2} " [3m])) /
          (sum(count_over_time({compose_service="nginx"} [3m])) > 0) > 0.05
        for: 3m
        labels:
          severity: critical
          component: nginx
        annotations:
          summary: "HTTP 5xx 错误率飙升"
          description: "Nginx 过去 3 分钟内 5xx 响应占比超过 5%，用户请求大面积失败。"
          suggested_fix: "检查 LumiGate 后端是否正常响应，查看 nginx 错误日志，确认上游服务健康状态。"
