groups:
  - name: lumigate-log-errors
    interval: 30s
    rules:
      - alert: LumiGateNetworkError
        expr: sum(count_over_time({compose_service="lumigate"} |= "network error" [2m])) > 0
        for: 30s
        labels:
          severity: warning
          component: lumigate
        annotations:
          summary: "网络连接异常"
          description: "LumiGate 在过去 2 分钟内出现网络错误，可能影响 AI 请求转发。"
          suggested_fix: "检查上游 AI 提供商连通性，确认 DNS 解析正常，查看是否有防火墙或代理拦截。"

      - alert: LumiGateBadRequestProvider
        expr: sum(count_over_time({compose_service="lumigate"} |= "Bad request to AI provider" [3m])) > 0
        for: 30s
        labels:
          severity: warning
          component: lumigate
        annotations:
          summary: "AI 提供商请求失败"
          description: "LumiGate 向上游 AI 提供商发送的请求被拒绝（Bad Request），过去 3 分钟内有错误记录。"
          suggested_fix: "检查请求参数格式是否正确，确认 API Key 有效，查看提供商是否有 API 变更或限流。"

      - alert: LumiGateUrlExtractFallback
        expr: sum(count_over_time({compose_service="lumigate"} |= "\"msg\":\"Tool fallback emitted\"" |= "\"fallbackType\":\"url_extract_failed\"" [3m])) > 0
        for: 45s
        labels:
          severity: warning
          component: lumigate
        annotations:
          summary: "URL 提取降级"
          description: "网页内容提取工具触发了降级回退，过去 3 分钟内 URL 解析失败。"
          suggested_fix: "检查 Collector (Chrome CDP) 是否正常运行，目标网页是否可访问，确认网络出口无限制。"

      - alert: LumiChatEncryptedPackFailed
        expr: sum(count_over_time({compose_service="lumigate"} |= "\"component\":\"lumichat-client\"" |= "\"msg\":\"encrypted_pack_failed\"" [3m])) > 0
        for: 20s
        labels:
          severity: warning
          component: lumichat
        annotations:
          summary: "加密上传打包失败"
          description: "LumiChat 客户端加密文件打包失败，用户上传功能受影响。"
          suggested_fix: "检查客户端浏览器兼容性，确认 SubtleCrypto API 可用，查看文件大小是否超限。"

      - alert: LumiChatFileUploadFailed
        expr: sum(count_over_time({compose_service="lumigate"} |= "\"component\":\"lumichat-client\"" |= "\"msg\":\"file_upload_failed\"" [3m])) > 0
        for: 20s
        labels:
          severity: warning
          component: lumichat
        annotations:
          summary: "文件上传失败"
          description: "LumiChat 客户端文件上传失败，用户无法发送附件。"
          suggested_fix: "检查服务端 /platform/parse 接口是否正常，确认文件大小未超过 10MB 限制，查看 file-parser 服务状态。"

      # --- New: PB write failures ---
      - alert: PBWriteFailed
        expr: sum(count_over_time({compose_service="lumigate"} |= "pb_write_failed" [5m])) > 3
        for: 1m
        labels:
          severity: critical
          component: pocketbase
        annotations:
          summary: "PocketBase 写入失败"
          description: "5分钟内超过3次PB写入失败，可能PB服务宕机或磁盘满。"
          suggested_fix: "检查PB容器状态: docker logs lumigate-pb --tail 20; docker compose restart pocketbase"

      # --- New: RAG retrieval failures ---
      - alert: RAGRetrievalFailed
        expr: sum(count_over_time({compose_service="lumigate"} |= "rag_retrieval_failed" [5m])) > 5
        for: 1m
        labels:
          severity: warning
          component: rag
        annotations:
          summary: "RAG 检索失败"
          description: "Qdrant/RAGFlow 检索异常，知识库查询功能受影响。"
          suggested_fix: "检查Qdrant容器: docker logs lumigate-qdrant --tail 20; 确认Qdrant端口6333可达"

      # --- New: Embedding failures ---
      - alert: EmbeddingFailed
        expr: sum(count_over_time({compose_service="lumigate"} |= "embedding_failed" [5m])) > 3
        for: 1m
        labels:
          severity: warning
          component: embedding
        annotations:
          summary: "Embedding 生成失败"
          description: "文本向量化失败，RAG检索和记忆功能受影响。"
          suggested_fix: "检查embedding模型服务是否正常，确认Ollama或OpenAI embedding API可达"

      # --- New: Memory ingest failures ---
      - alert: MemoryIngestFailed
        expr: sum(count_over_time({compose_service="lumigate"} |= "user_memory_ingest_failed" [5m])) > 5
        for: 1m
        labels:
          severity: warning
          component: memory
        annotations:
          summary: "用户记忆写入失败"
          description: "长期记忆提取或存储失败，用户个性化功能受影响。"
          suggested_fix: "检查Qdrant和PB服务状态，确认embedding模型正常"

      # --- New: Frontend error spike ---
      - alert: FrontendErrorSpike
        expr: sum(count_over_time({compose_service="lumigate"} |= "\"component\":\"lumichat-client\"" |= "\"level\":\"error\"" [5m])) > 10
        for: 1m
        labels:
          severity: warning
          component: frontend
        annotations:
          summary: "前端错误激增"
          description: "LumiChat 客户端在5分钟内报告超过10次错误，用户体验可能严重受损。"
          suggested_fix: "查看客户端日志: docker logs lumigate --tail 200 | grep lumichat-client; 检查是否有JS错误或网络问题"

      # --- New: Tool execution failures ---
      - alert: ToolExecutionFailed
        expr: sum(count_over_time({compose_service="lumigate"} |= "tool_execution_failed" [5m])) > 3
        for: 1m
        labels:
          severity: warning
          component: tools
        annotations:
          summary: "工具执行失败"
          description: "AI工具调用执行失败超过3次，可能影响文件生成、代码执行等功能。"
          suggested_fix: "检查工具依赖服务: file-parser, whisper, sandbox容器是否正常运行"

      # --- New: Client window errors ---
      - alert: ClientWindowError
        expr: sum(count_over_time({compose_service="lumigate"} |= "\"msg\":\"window_error\"" [5m])) > 5
        for: 1m
        labels:
          severity: warning
          component: frontend
        annotations:
          summary: "前端 JS 异常"
          description: "LumiChat 浏览器端出现未捕获的JavaScript异常。"
          suggested_fix: "查看日志中 window_error 条目的 source/line/column 定位问题"

      # --- New: Unhandled promise rejections from client ---
      - alert: ClientUnhandledRejection
        expr: sum(count_over_time({compose_service="lumigate"} |= "\"msg\":\"unhandled_rejection\"" [5m])) > 5
        for: 1m
        labels:
          severity: warning
          component: frontend
        annotations:
          summary: "前端 Promise 未处理拒绝"
          description: "LumiChat 浏览器端出现未处理的Promise rejection。"
          suggested_fix: "查看日志中 unhandled_rejection 条目的 reason 字段定位问题"

  - name: lumigate-infrastructure
    interval: 30s
    rules:
      # OOM risk: container logging memory pressure indicators
      - alert: LumiGateOOMRisk
        expr: sum(count_over_time({compose_service="lumigate"} |~ "(?i)(heap|memory|oom|allocation failed|out of memory|ENOMEM|JavaScript heap)" [2m])) > 0
        for: 1m
        labels:
          severity: critical
          component: lumigate
        annotations:
          summary: "OOM 风险"
          description: "LumiGate 服务内存使用过高，检测到内存相关错误，可能即将 OOM 崩溃。"
          suggested_fix: "检查是否有内存泄漏，考虑重启服务或增加容器内存限制。运行 docker stats 查看实时内存占用。"

      # High latency: slow request warnings
      - alert: LumiGateHighLatency
        expr: sum(count_over_time({compose_service="lumigate"} |= "\"level\":\"warn\"" |~ "(?i)(slow|timeout|took \\d{4,}ms|latency)" [5m])) > 3
        for: 5m
        labels:
          severity: warning
          component: lumigate
        annotations:
          summary: "请求延迟过高"
          description: "过去 5 分钟内出现多次慢请求或超时，用户体验可能受影响。"
          suggested_fix: "检查上游 AI 提供商响应速度，确认服务器 CPU/内存负载正常，查看是否有大量并发请求。"

      # Collector down: collector health failures
      - alert: CollectorDown
        expr: sum(count_over_time({compose_service="lumigate"} |~ "(?i)(collector.*(unavailable|down|failed|error|unhealthy)|CDP.*(error|refused|timeout))" [2m])) > 0
        for: 2m
        labels:
          severity: critical
          component: collector
        annotations:
          summary: "Collector 服务宕机"
          description: "Chrome CDP (Collector) 健康检查连续失败超过 2 分钟，网页抓取和 URL 提取功能不可用。"
          suggested_fix: "运行 docker compose restart collector 重启服务，检查 Chrome 进程是否僵死，确认内存是否充足。"

      # PocketBase unavailable
      - alert: PocketBaseUnavailable
        expr: sum(count_over_time({compose_service="lumigate"} |~ "(?i)(pocketbase.*(unavailable|refused|timeout|ECONNREFUSED)|PB.*(error|failed|unreachable))" [1m])) > 0
        for: 1m
        labels:
          severity: critical
          component: pocketbase
        annotations:
          summary: "PocketBase 数据库不可用"
          description: "PocketBase 连接失败超过 1 分钟，用户认证和数据持久化功能完全中断。"
          suggested_fix: "检查 PocketBase 容器是否运行中 (docker ps)，查看磁盘空间是否充足，尝试 docker compose restart pocketbase。"

      # Error rate spike: high volume of error-level log entries
      - alert: ErrorRateSpike
        expr: |
          sum(count_over_time({compose_service="lumigate"} |= "\"level\":\"error\"" [3m])) /
          (sum(count_over_time({compose_service="lumigate"} [3m])) > 0) > 0.05
        for: 3m
        labels:
          severity: critical
          component: lumigate
        annotations:
          summary: "错误率飙升"
          description: "LumiGate 过去 3 分钟内错误日志占比超过 5%，服务可能存在系统性故障。"
          suggested_fix: "查看最近错误日志定位根因 (docker logs lumigate --tail 100)，检查是否有配置变更或上游故障。"

      # 5xx rate spike (via nginx access logs)
      - alert: Http5xxRateSpike
        expr: |
          sum(count_over_time({compose_service="nginx"} |~ "\" 5\\d{2} " [3m])) /
          (sum(count_over_time({compose_service="nginx"} [3m])) > 0) > 0.05
        for: 3m
        labels:
          severity: critical
          component: nginx
        annotations:
          summary: "HTTP 5xx 错误率飙升"
          description: "Nginx 过去 3 分钟内 5xx 响应占比超过 5%，用户请求大面积失败。"
          suggested_fix: "检查 LumiGate 后端是否正常响应，查看 nginx 错误日志，确认上游服务健康状态。"

      # --- New: Alert webhook delivery failures ---
      - alert: AlertWebhookFailed
        expr: sum(count_over_time({compose_service="lumigate"} |= "alert_webhook_failed" [5m])) > 3
        for: 1m
        labels:
          severity: warning
          component: alerts
        annotations:
          summary: "告警 Webhook 发送失败"
          description: "告警通知无法送达，可能导致后续故障无法及时发现。"
          suggested_fix: "检查 ALERT_WEBHOOK_URL 环境变量是否正确，目标服务是否可达"
