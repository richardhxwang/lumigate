upstream app {
    server lumigate:9471 max_fails=2 fail_timeout=5s;
    keepalive 32;
    keepalive_timeout 60s;
    keepalive_requests 1000;
}

upstream file_parser {
    server lumigate-file-parser:3100 max_fails=2 fail_timeout=5s;
    keepalive 8;
}

upstream doc_gen {
    server lumigate-doc-gen:3101 max_fails=2 fail_timeout=5s;
    keepalive 8;
}

# Cache zone for maintenance fallback
proxy_cache_path /tmp/nginx-cache levels=1:2 keys_zone=fallback:1m max_size=10m inactive=24h;

server {
    listen 80;
    server_tokens off;

    # Stealth mode: LumiGate writes access_log off; here when enabled
    # Default file is empty (normal logging). After toggle, run:
    #   docker exec lumigate-nginx nginx -s reload
    include /app/data/stealth.conf;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=(), usb=()" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    server_name _;

    client_max_body_size 10m;

    # M-02: Return JSON (not HTML) for 413 on API paths
    error_page 413 = @error_413;

    # Larger buffers for AI streaming responses
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Fast failover — detect app down quickly, auto-retry on transient errors
    proxy_connect_timeout 2s;
    proxy_next_upstream error timeout http_502 http_503;
    proxy_next_upstream_timeout 3s;
    proxy_next_upstream_tries 2;

    # SSE support for streaming AI responses
    proxy_set_header Accept-Encoding "";
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # Health endpoint — cached so it works during restarts
    location = /health {
        proxy_pass http://app;
        proxy_cache fallback;
        proxy_cache_valid 200 10s;
        proxy_cache_use_stale error timeout updating http_502 http_503 http_504;
        error_page 502 503 504 = @maintenance_health;
    }

    # Static assets — serve from cache during downtime
    location /logos/ {
        proxy_pass http://app;
        proxy_cache fallback;
        proxy_cache_valid 200 1h;
        proxy_cache_use_stale error timeout updating http_502 http_503 http_504;
        error_page 502 503 504 = @maintenance;
    }

    location ~ ^/(favicon|lumichat-icon)\.svg$ {
        proxy_pass http://app;
        proxy_cache fallback;
        proxy_cache_valid 200 1h;
        proxy_cache_use_stale error timeout updating http_502 http_503 http_504;
        error_page 502 503 504 = @maintenance;
    }

    # Landing page — cached with stale fallback
    location = / {
        proxy_pass http://app;
        proxy_cache fallback;
        proxy_cache_valid 200 30s;
        proxy_cache_use_stale error timeout updating http_502 http_503 http_504;
        error_page 502 503 504 = @maintenance;
    }

    # Dashboard — nonce-CSP injected by app (overrides server-level headers)
    location = /v1/sys/panel {
        proxy_pass http://app;
        proxy_cache off;
        # Re-declare all security headers EXCEPT CSP (app injects nonce-CSP)
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=(), usb=()" always;
        error_page 502 503 504 = @maintenance;
    }

    # Old dashboard path — return 404
    location = /dashboard {
        return 404;
    }

    location = /chat {
        proxy_pass http://app;
        # Don't cache chat — requires admin session
        proxy_cache off;
        error_page 502 503 504 = @maintenance;
    }

    location = /lumichat {
        proxy_pass http://app;
        # Don't cache — nonce injected per request; requires lc_token cookie
        proxy_cache off;
        # App injects nonce-based CSP; suppress nginx's global unsafe-inline CSP
        proxy_hide_header Content-Security-Policy;
        error_page 502 503 504 = @maintenance;
    }

    # LumiChat static libs — cacheable, no auth required
    location /lumichat-libs/ {
        proxy_pass http://app;
        proxy_cache fallback;
        proxy_cache_valid 200 1h;
        proxy_cache_use_stale error timeout updating http_502 http_503 http_504;
        error_page 502 503 504 = @maintenance;
    }

    # LumiChat API — no cache; file uploads need large body limit
    location /lc/ {
        proxy_pass http://app;
        proxy_cache off;
        client_max_body_size 500m;
        error_page 413 = @error_413_lc;
        error_page 502 503 504 = @maintenance_api;
    }

    # Agent Platform: file parsing — via app (routes/parse.js)
    location = /v1/parse {
        proxy_pass http://app;
        client_max_body_size 50m;
        proxy_read_timeout 60s;
        error_page 502 503 504 = @maintenance_api;
    }

    # Agent Platform: audio transcription — via app (routes/audio.js)
    location /v1/audio/ {
        proxy_pass http://app;
        client_max_body_size 25m;
        proxy_read_timeout 120s;
        error_page 502 503 504 = @maintenance_api;
    }

    # Agent Platform: vision analysis — via app (routes/vision.js)
    location /v1/vision/ {
        proxy_pass http://app;
        client_max_body_size 20m;
        proxy_read_timeout 60s;
        error_page 502 503 504 = @maintenance_api;
    }

    # Agent Platform: code sandbox — via app (routes/code.js)
    location /v1/code/ {
        proxy_pass http://app;
        client_max_body_size 1m;
        proxy_read_timeout 90s;
        error_page 502 503 504 = @maintenance_api;
    }

    # Agent Platform: tool execution — via app (server-side unified registry)
    location = /v1/tools/execute {
        proxy_pass http://app;
        client_max_body_size 5m;
        proxy_read_timeout 60s;
        error_page 502 503 504 = @maintenance_api;
    }

    # Document generation — proxy to doc-gen container
    location /v1/generate/ {
        proxy_pass http://doc_gen/generate/;
        client_max_body_size 5m;
        proxy_read_timeout 30s;
        error_page 502 503 504 = @maintenance_api;
    }

    # Tool registry — list available tools
    location = /v1/tools {
        proxy_pass http://doc_gen/tools;
        proxy_cache fallback;
        proxy_cache_valid 200 5m;
        error_page 502 503 504 = @maintenance_api;
    }

    # LibreOffice/Gotenberg — document conversion (resolver allows startup without gotenberg)
    location /v1/convert/ {
        resolver 127.0.0.11 valid=30s;
        set $gotenberg_upstream http://lumigate-gotenberg:3000;
        proxy_pass $gotenberg_upstream/forms/libreoffice/convert/;
        client_max_body_size 50m;
        proxy_read_timeout 120s;
        error_page 502 503 504 = @maintenance_api;
    }

    # API proxy — pass through, show maintenance on failure
    location /v1/ {
        proxy_pass http://app;
        error_page 502 503 504 = @maintenance_api;
    }

    # Admin API — pass through
    location /admin/ {
        proxy_pass http://app;
        error_page 502 503 504 = @maintenance_api;
    }

    # Public API endpoints — cached
    location /providers {
        proxy_pass http://app;
        proxy_cache fallback;
        proxy_cache_valid 200 30s;
        proxy_cache_use_stale error timeout updating http_502 http_503 http_504;
        error_page 502 503 504 = @maintenance_api;
    }

    location /models/ {
        proxy_pass http://app;
        proxy_cache fallback;
        proxy_cache_valid 200 5m;
        proxy_cache_use_stale error timeout updating http_502 http_503 http_504;
        error_page 502 503 504 = @maintenance_api;
    }

    # Everything else
    location / {
        proxy_pass http://app;
        error_page 502 503 504 = @maintenance;
    }

    # Maintenance fallback: HTML page
    location @maintenance {
        default_type text/html;
        return 503 '<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AI Gateway - Maintenance</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f2f2f7;color:#1c1c1e;-webkit-font-smoothing:antialiased}.card{background:rgba(255,255,255,.7);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border:1px solid rgba(255,255,255,.8);border-radius:20px;padding:40px;text-align:center;max-width:400px;margin:20px;box-shadow:0 4px 24px rgba(0,0,0,.06)}h1{font-size:20px;font-weight:700;margin-bottom:8px}.sub{color:rgba(0,0,0,.4);font-size:14px;line-height:1.5;margin-bottom:20px}.dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#ff9500;animation:pulse 2s infinite;margin-right:6px}@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}.status{font-size:13px;color:rgba(0,0,0,.35);font-weight:500}</style></head><body><div class="card"><h1>AI Gateway</h1><p class="sub">System is updating. Service will be back shortly.</p><p class="status"><span class="dot"></span>Maintenance in progress</p></div><script>setTimeout(()=>location.reload(),5000)</script></body></html>';
    }

    # Maintenance fallback: API JSON
    location @maintenance_api {
        default_type application/json;
        add_header Retry-After 5 always;
        return 503 '{"error":"Service temporarily unavailable","message":"Gateway is updating, please retry in a few seconds","retry_after":5}';
    }

    # Maintenance fallback: Health JSON (degraded)
    location @maintenance_health {
        default_type application/json;
        return 503 '{"status":"maintenance","message":"Gateway is restarting"}';
    }

    # Unified JSON response for 413 (payload too large)
    location @error_413 {
        default_type application/json;
        return 413 '{"error":"Payload too large","message":"Request body exceeds 10MB limit"}';
    }

    # 413 for /lc/ routes (500MB limit)
    location @error_413_lc {
        default_type application/json;
        return 413 '{"error":"Payload too large","message":"Request body exceeds 500MB limit"}';
    }
}
