upstream app {
    server lumigate:9471 max_fails=2 fail_timeout=5s;
    keepalive 32;
    keepalive_timeout 60s;
    keepalive_requests 1000;
}

upstream file_parser {
    server lumigate-file-parser:3100 max_fails=2 fail_timeout=5s;
    keepalive 8;
}

upstream doc_gen {
    server lumigate-doc-gen:3101 max_fails=2 fail_timeout=5s;
    keepalive 8;
}

# Cache zone for maintenance fallback
proxy_cache_path /tmp/nginx-cache levels=1:2 keys_zone=fallback:1m max_size=10m inactive=24h;

server {
    listen 80;
    server_tokens off;

    # Stealth mode: LumiGate writes access_log off; here when enabled
    # Default file is empty (normal logging). After toggle, run:
    #   docker exec lumigate-nginx nginx -s reload
    include /app/data/stealth.conf;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data: https://www.google.com; connect-src 'self'; frame-ancestors 'none'" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=(self), payment=(), usb=()" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    server_name _;

    client_max_body_size 10m;

    # M-02: Return JSON (not HTML) for 413 on API paths
    error_page 413 = @error_413;

    # SSE streaming: disable all buffering for real-time delivery
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_cache off;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    chunked_transfer_encoding on;
    tcp_nodelay on;
    tcp_nopush off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Fast failover — detect app down quickly, auto-retry on transient errors
    proxy_connect_timeout 2s;
    proxy_next_upstream error timeout http_502 http_503;
    proxy_next_upstream_timeout 3s;
    proxy_next_upstream_tries 2;

    # SSE support for streaming AI responses
    proxy_set_header Accept-Encoding "";
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # noVNC proxy for Collector login — websocket upgrade required
    location /vnc/ {
        proxy_pass http://lumigate:7900/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Health endpoint — cached so it works during restarts
    location = /health {
        proxy_pass http://app;
        proxy_cache fallback;
        proxy_cache_valid 200 10s;
        proxy_cache_use_stale error timeout updating http_502 http_503 http_504;
        error_page 502 503 504 = @maintenance_health;
    }

    # Static assets — serve from cache during downtime
    location /logos/ {
        proxy_pass http://app;
        proxy_cache fallback;
        proxy_cache_valid 200 1h;
        proxy_cache_use_stale error timeout updating http_502 http_503 http_504;
        error_page 502 503 504 = @maintenance;
    }

    location ~ ^/(favicon|lumichat-icon)\.svg$ {
        proxy_pass http://app;
        proxy_cache fallback;
        proxy_cache_valid 200 1h;
        proxy_cache_use_stale error timeout updating http_502 http_503 http_504;
        error_page 502 503 504 = @maintenance;
    }

    # Landing page — cached with stale fallback
    location = / {
        proxy_pass http://app;
        proxy_cache fallback;
        proxy_cache_valid 200 30s;
        proxy_cache_use_stale error timeout updating http_502 http_503 http_504;
        error_page 502 503 504 = @maintenance;
    }

    # Dashboard — nonce-CSP injected by app (overrides server-level headers)
    location = /v1/sys/panel {
        proxy_pass http://app;
        proxy_cache off;
        # Re-declare all security headers EXCEPT CSP (app injects nonce-CSP)
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Permissions-Policy "geolocation=(), camera=(), microphone=(self), payment=(), usb=()" always;
        error_page 502 503 504 = @maintenance;
    }

    # Block test pages from public access
    location = /test-clean-chat.html {
        deny all;
        return 404;
    }

    # Old dashboard path — return 404
    location = /dashboard {
        return 404;
    }

    location = /chat {
        proxy_pass http://app;
        # Don't cache chat — requires admin session
        proxy_cache off;
        error_page 502 503 504 = @maintenance;
    }

    location = /lumichat {
        proxy_pass http://app;
        proxy_cache off;
        # App injects its own nonce-based CSP with CDN allowlists.
        # MUST override nginx's global CSP (add_header in server block).
        # In nginx, add_header in location block replaces ALL parent add_headers,
        # so we re-declare only the non-CSP security headers here.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Permissions-Policy "geolocation=(), camera=(), microphone=(self), payment=(), usb=()" always;
        # CSP handled by server.js — frame-ancestors 'self' allows LumiTrade iframe
        proxy_hide_header Content-Security-Policy;
        error_page 502 503 504 = @maintenance;
    }

    location = /lumichat/test {
        proxy_pass http://app;
        # Don't cache — nonce injected per request; requires lc_token cookie
        proxy_cache off;
        # Keep CSP behavior identical to /lumichat to avoid style/script divergence.
        proxy_hide_header Content-Security-Policy;
        error_page 502 503 504 = @maintenance;
    }

    # LumiTrade — FreqUI reskinned, served at /lumitrade/
    # Vue Router base set to /lumitrade/ in the JS bundle
    location = /lumitrade {
        return 302 /lumitrade/;
    }
    # Legacy /frequi/ redirect (browsers cached old 301)
    location /frequi/ {
        return 302 /lumitrade/;
    }
    location = /frequi {
        return 302 /lumitrade/;
    }
    # Auto-auth endpoint — served by LumiGate, NOT freqtrade
    location = /lumitrade/auto-auth {
        proxy_pass http://app/lumitrade/auto-auth;
        proxy_cache off;
    }
    location /lumitrade/ {
        proxy_pass http://lumigate-freqtrade:8080/;
        # Force no-cache on HTML to prevent stale UI
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        proxy_hide_header Cache-Control;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header Accept-Encoding "";
        proxy_cache off;

        # Rewrite absolute asset paths to /lumitrade/ prefix
        sub_filter 'href="/assets/'   'href="/lumitrade/assets/';
        sub_filter 'src="/assets/'    'src="/lumitrade/assets/';
        sub_filter 'href="/favicon.ico"' 'href="/lumitrade/favicon.ico"';
        sub_filter_once off;
        sub_filter_types text/html;

        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Backtest instance API — webserver mode for backtesting
    location /lumitrade/bt/api/ {
        proxy_pass http://lumigate-freqtrade-bt:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 600;
    }

    # Pure SMC bot — second freqtrade instance
    location /lumitrade/pure/ {
        proxy_pass http://lumigate-freqtrade-pure:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # FreqUI assets fallback — Vite CSS preloads use absolute /assets/ paths
    location /assets/ {
        proxy_pass http://lumigate-freqtrade:8080/assets/;
        proxy_cache fallback;
        add_header Cache-Control "public, max-age=86400";
    }

    # LumiTrader AI assistant API — long timeout for LLM streaming
    location /lumitrader/ {
        proxy_pass http://app;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_buffering off;
        error_page 502 503 504 = @maintenance_api;
    }

    # LumiChat static libs — cacheable, no auth required
    location /lumichat-libs/ {
        proxy_pass http://app;
        proxy_cache fallback;
        proxy_cache_valid 200 1h;
        proxy_cache_use_stale error timeout updating http_502 http_503 http_504;
        error_page 502 503 504 = @maintenance;
    }

    # LumiChat API — no cache; file uploads need large body limit
    location /lc/ {
        proxy_pass http://app;
        proxy_cache off;
        client_max_body_size 500m;
        error_page 413 = @error_413_lc;
        error_page 502 503 504 = @maintenance_api;
    }

    # Agent Platform: file parsing — via app (routes/parse.js)
    location = /platform/parse {
        proxy_pass http://app;
        client_max_body_size 50m;
        proxy_read_timeout 60s;
        error_page 502 503 504 = @maintenance_api;
    }

    # Agent Platform: audio transcription — via app (routes/audio.js)
    location /platform/audio/ {
        proxy_pass http://app;
        client_max_body_size 25m;
        proxy_read_timeout 120s;
        error_page 502 503 504 = @maintenance_api;
    }

    # Agent Platform: vision analysis — via app (routes/vision.js)
    location /platform/vision/ {
        proxy_pass http://app;
        client_max_body_size 20m;
        proxy_read_timeout 60s;
        error_page 502 503 504 = @maintenance_api;
    }

    # Agent Platform: code sandbox — via app (routes/code.js)
    location /platform/code/ {
        proxy_pass http://app;
        client_max_body_size 1m;
        proxy_read_timeout 90s;
        error_page 502 503 504 = @maintenance_api;
    }

    # Agent Platform: knowledge/RAG — large document uploads
    location /platform/knowledge {
        proxy_pass http://app;
        client_max_body_size 50m;
        proxy_read_timeout 120s;
        error_page 502 503 504 = @maintenance_api;
    }

    # Knowledge API (v1 path) — large document uploads
    location /v1/knowledge {
        proxy_pass http://app;
        client_max_body_size 50m;
        proxy_read_timeout 120s;
        error_page 502 503 504 = @maintenance_api;
    }

    # Private OpenClaw location webhook relay.
    # Keep this on an unguessable path and allow only small POST bodies.
    location = /v47/webhooks/location {
        limit_except POST { deny all; }
        proxy_pass http://host.docker.internal:18789/webhooks/location;
        proxy_cache off;
        client_max_body_size 64k;
        proxy_read_timeout 30s;
        error_page 413 = @error_413;
        error_page 502 503 504 = @maintenance_api;
    }

    # Agent Platform: tool execution — via app (server-side unified registry)
    location = /platform/tools/execute {
        proxy_pass http://app;
        client_max_body_size 5m;
        proxy_read_timeout 60s;
        error_page 502 503 504 = @maintenance_api;
    }

    # Chat API — encrypted file bundles can expand well past the original file size
    location = /v1/chat {
        proxy_pass http://app;
        client_max_body_size 256m;
        proxy_read_timeout 300s;
        error_page 502 503 504 = @maintenance_api;
    }

    # Document generation — proxy to doc-gen container
    location /v1/generate/ {
        proxy_pass http://doc_gen/generate/;
        client_max_body_size 5m;
        proxy_read_timeout 30s;
        error_page 502 503 504 = @maintenance_api;
    }

    # Tool registry — list available tools
    location = /v1/tools {
        proxy_pass http://doc_gen/tools;
        proxy_cache fallback;
        proxy_cache_valid 200 5m;
        error_page 502 503 504 = @maintenance_api;
    }

    # LibreOffice/Gotenberg — document conversion (resolver allows startup without gotenberg)
    location /v1/convert/ {
        resolver 127.0.0.11 valid=30s;
        set $gotenberg_upstream http://lumigate-gotenberg:3000;
        proxy_pass $gotenberg_upstream/forms/libreoffice/convert/;
        client_max_body_size 50m;
        proxy_read_timeout 120s;
        error_page 502 503 504 = @maintenance_api;
    }

    # LumiTrade WebSocket — must come before generic /v1/ catch-all
    location /v1/trade/ws/ {
        proxy_pass http://app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # API proxy — pass through, show maintenance on failure
    location /v1/ {
        proxy_pass http://app;
        error_page 502 503 504 = @maintenance_api;
    }

    # Admin API — pass through
    location /admin/ {
        proxy_pass http://app;
        error_page 502 503 504 = @maintenance_api;
    }

    # Public API endpoints — cached
    location /providers {
        proxy_pass http://app;
        proxy_cache fallback;
        proxy_cache_valid 200 30s;
        proxy_cache_use_stale error timeout updating http_502 http_503 http_504;
        error_page 502 503 504 = @maintenance_api;
    }

    location /models/ {
        proxy_pass http://app;
        proxy_cache fallback;
        proxy_cache_valid 200 5m;
        proxy_cache_use_stale error timeout updating http_502 http_503 http_504;
        error_page 502 503 504 = @maintenance_api;
    }

    # Everything else
    location / {
        proxy_pass http://app;
        error_page 502 503 504 = @maintenance;
    }

    # Maintenance fallback: HTML page
    location @maintenance {
        default_type text/html;
        return 503 '<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>LumiGate</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0a0a0a;color:#f0f0f0;-webkit-font-smoothing:antialiased}.card{background:rgba(255,255,255,.04);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:48px 40px;text-align:center;max-width:400px;margin:20px;box-shadow:0 4px 24px rgba(0,0,0,.3)}.logo{width:40px;height:40px;margin:0 auto 16px}h1{font-size:20px;font-weight:700;margin-bottom:8px;letter-spacing:-.3px}.sub{color:rgba(255,255,255,.4);font-size:14px;line-height:1.5;margin-bottom:24px}.dots{display:flex;gap:5px;justify-content:center;margin-bottom:16px}.dot{width:7px;height:7px;background:rgba(255,255,255,.5);border-radius:50%;animation:typ 1.2s infinite ease-in-out}.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}@keyframes typ{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}.status{font-size:12px;color:rgba(255,255,255,.25);font-weight:500}</style></head><body><div class="card"><svg class="logo" viewBox="0 0 40 40"><circle cx="20" cy="20" r="20" fill="#10a37f"/><path d="M12 20c0-4.4 3.6-8 8-8s8 3.6 8 8-3.6 8-8 8" stroke="#fff" stroke-width="2.5" stroke-linecap="round" fill="none"/><circle cx="20" cy="20" r="3" fill="#fff"/></svg><h1>LumiGate</h1><p class="sub">Updating. Back in a moment.</p><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div><p class="status">Auto-refresh in 5s</p></div><script>setTimeout(()=>location.reload(),5000)</script></body></html>';
    }

    # Maintenance fallback: API JSON
    location @maintenance_api {
        default_type application/json;
        add_header Retry-After 5 always;
        return 503 '{"error":"Service temporarily unavailable","message":"LumiGate is updating, please retry in a few seconds","retry_after":5}';
    }

    # Maintenance fallback: Health JSON (degraded)
    location @maintenance_health {
        default_type application/json;
        return 503 '{"status":"maintenance","message":"LumiGate is restarting"}';
    }

    # Unified JSON response for 413 (payload too large)
    location @error_413 {
        default_type application/json;
        return 413 '{"error":"Payload too large","message":"Request body exceeds 10MB limit"}';
    }

    # 413 for /lc/ routes (500MB limit)
    location @error_413_lc {
        default_type application/json;
        return 413 '{"error":"Payload too large","message":"Request body exceeds 500MB limit"}';
    }
}
