upstream app {
    server ai-api-proxy:9471;
    keepalive 16;
}

# Cache zone for maintenance fallback
proxy_cache_path /tmp/nginx-cache levels=1:2 keys_zone=fallback:1m max_size=10m inactive=24h;

server {
    listen 80;
    server_tokens off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    server_name _;

    # Larger buffers for AI streaming responses
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Fast failover — detect app down quickly
    proxy_connect_timeout 2s;

    # SSE support for streaming AI responses
    proxy_set_header Accept-Encoding "";
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # Health endpoint — cached so it works during restarts
    location = /health {
        proxy_pass http://app;
        proxy_cache fallback;
        proxy_cache_valid 200 10s;
        proxy_cache_use_stale error timeout updating http_502 http_503 http_504;
        error_page 502 503 504 = @maintenance_health;
    }

    # Static assets — serve from cache during downtime
    location /logos/ {
        proxy_pass http://app;
        proxy_cache fallback;
        proxy_cache_valid 200 1h;
        proxy_cache_use_stale error timeout updating http_502 http_503 http_504;
        error_page 502 503 504 = @maintenance;
    }

    location = /favicon.svg {
        proxy_pass http://app;
        proxy_cache fallback;
        proxy_cache_valid 200 1h;
        proxy_cache_use_stale error timeout updating http_502 http_503 http_504;
        error_page 502 503 504 = @maintenance;
    }

    # Dashboard & Chat pages — cached with stale fallback
    location = / {
        proxy_pass http://app;
        proxy_cache fallback;
        proxy_cache_valid 200 30s;
        proxy_cache_use_stale error timeout updating http_502 http_503 http_504;
        error_page 502 503 504 = @maintenance;
    }

    location = /chat {
        proxy_pass http://app;
        # Don't cache chat — it has injected key
        error_page 502 503 504 = @maintenance;
    }

    # API proxy — pass through, show maintenance on failure
    location /v1/ {
        proxy_pass http://app;
        error_page 502 503 504 = @maintenance_api;
    }

    # Admin API — pass through
    location /admin/ {
        proxy_pass http://app;
        error_page 502 503 504 = @maintenance_api;
    }

    # Public API endpoints — cached
    location /providers {
        proxy_pass http://app;
        proxy_cache fallback;
        proxy_cache_valid 200 30s;
        proxy_cache_use_stale error timeout updating http_502 http_503 http_504;
        error_page 502 503 504 = @maintenance_api;
    }

    location /models/ {
        proxy_pass http://app;
        proxy_cache fallback;
        proxy_cache_valid 200 5m;
        proxy_cache_use_stale error timeout updating http_502 http_503 http_504;
        error_page 502 503 504 = @maintenance_api;
    }

    # Everything else
    location / {
        proxy_pass http://app;
        error_page 502 503 504 = @maintenance;
    }

    # Maintenance fallback: HTML page
    location @maintenance {
        default_type text/html;
        return 503 '<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AI Gateway - Maintenance</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f2f2f7;color:#1c1c1e;-webkit-font-smoothing:antialiased}.card{background:rgba(255,255,255,.7);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border:1px solid rgba(255,255,255,.8);border-radius:20px;padding:40px;text-align:center;max-width:400px;margin:20px;box-shadow:0 4px 24px rgba(0,0,0,.06)}h1{font-size:20px;font-weight:700;margin-bottom:8px}.sub{color:rgba(0,0,0,.4);font-size:14px;line-height:1.5;margin-bottom:20px}.dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#ff9500;animation:pulse 2s infinite;margin-right:6px}@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}.status{font-size:13px;color:rgba(0,0,0,.35);font-weight:500}</style></head><body><div class="card"><h1>AI Gateway</h1><p class="sub">System is updating. Service will be back shortly.</p><p class="status"><span class="dot"></span>Maintenance in progress</p></div><script>setTimeout(()=>location.reload(),5000)</script></body></html>';
    }

    # Maintenance fallback: API JSON
    location @maintenance_api {
        default_type application/json;
        return 503 '{"error":"Service temporarily unavailable","message":"Gateway is updating, please retry in a few seconds","retry_after":5}';
        add_header Retry-After 5;
    }

    # Maintenance fallback: Health JSON (degraded)
    location @maintenance_health {
        default_type application/json;
        return 503 '{"status":"maintenance","message":"Gateway is restarting"}';
    }
}
